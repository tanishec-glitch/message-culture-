<!DOCTYPE html>
<html>
<head>
    <title>Tanish Gram - Pro Max</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; padding-bottom: 70px; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; font-weight: bold; font-style: italic; font-size: 22px; }
        .section { display: none; }
        .active { display: block; }

        /* Post & Heart */
        .post-card { background: white; border-bottom: 1px solid #dbdbdb; margin-bottom: 15px; }
        .post-img-wrap { position: relative; width: 100%; cursor: pointer; }
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 80px; color: white; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 10; }
        .big-heart.animate { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }
        .comment-box { padding: 10px; font-size: 13px; color: #555; background: #fcfcfc; }

        /* Chat System */
        .chat-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: white; }
        .msg-box { height: 75vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #f0f2f5; }
        .msg { padding: 8px 12px; border-radius: 18px; margin: 4px; max-width: 70%; font-size: 14px; }
        .sent { background: #0095f6; color: white; align-self: flex-end; }
        .rec { background: #e4e6eb; color: black; align-self: flex-start; }

        /* Footer */
        .footer { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 24px; z-index: 200; }
    </style>
</head>
<body>

    <div class="header">
        Instagram 
        <div style="display:flex; gap:15px; font-style:normal;">
            <span onclick="show('chat')">📩</span>
        </div>
    </div>

    <div id="feed-sec" class="section active">
        <div id="posts-list"></div>
    </div>

    <div id="chat-sec" class="section">
        <h3 style="padding:15px;">Messages</h3>
        <div id="user-list"></div>
    </div>

    <div id="chat-window" class="section">
        <div style="padding:10px; border-bottom:1px solid #ddd; display:flex; align-items:center;">
            <span onclick="show('chat')" style="margin-right:15px; cursor:pointer;">⬅️</span>
            <b id="chat-name">User</b>
        </div>
        <div id="msg-list" class="msg-box"></div>
        <div style="padding:10px; display:flex; background:white;">
            <input id="m-in" placeholder="Type message..." style="flex:1; padding:10px; border-radius:20px; border:1px solid #ddd;">
            <button onclick="sendM()" style="border:none; background:none; color:#0095f6; font-weight:bold; margin-left:10px;">Send</button>
        </div>
    </div>

    <div id="profile-sec" class="section" style="text-align:center; padding:20px;">
        <h3 id="p-name">Username</h3>
        <div id="p-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:2px;"></div>
    </div>

    <div class="footer">
        <span onclick="show('feed')">🏠</span>
        <span onclick="upload()">➕</span>
        <span onclick="show('reels')">🎬</span>
        <span onclick="show('profile')">👤</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let me = { name: "User" };
        let activeC = "";
        let tapTime = 0;

        auth.onAuthStateChanged(async user => {
            if (user) {
                const d = await db.collection("users").doc(user.uid).get();
                if(d.exists) me = d.data();
                show('feed');
            } else {
                let e = prompt("Email:"); let p = prompt("Password:");
                auth.signInWithEmailAndPassword(e,p).catch(()=>location.reload());
            }
        });

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            let target = document.getElementById(id + '-sec') || document.getElementById(id);
            if(target) target.classList.add('active');
            if(id === 'feed') loadFeed();
            if(id === 'chat') loadUsers();
            if(id === 'profile') loadP();
        }

        // --- FEED & LIKES ---
        function loadFeed() {
            db.collection("posts").where("type","==","photo").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div class="post-card">
                        <div style="padding:10px; font-weight:bold;">@${d.username}</div>
                        <div class="post-img-wrap" onclick="doLike('${doc.id}', ${d.likes || 0}, this)">
                            <div class="big-heart">❤️</div>
                            <img src="${d.url}" style="width:100%">
                        </div>
                        <div style="padding:10px;">❤️ <b>${d.likes || 0} likes</b> <span onclick="doComment('${doc.id}')" style="margin-left:15px; cursor:pointer;">💬</span></div>
                        <div id="comm-${doc.id}" class="comment-box"></div>
                    </div>`;
                    loadComments(doc.id);
                });
                document.getElementById('posts-list').innerHTML = h;
            });
        }

        async function doLike(id, l, el) {
            const now = Date.now();
            if(now - tapTime < 300) {
                el.querySelector('.big-heart').classList.add('animate');
                setTimeout(()=>el.querySelector('.big-heart').classList.remove('animate'), 800);
                await db.collection("posts").doc(id).update({ likes: l + 1 });
            }
            tapTime = now;
        }

        // --- COMMENTS ---
        function doComment(id) {
            const t = prompt("Write your comment:");
            if(t) db.collection("posts").doc(id).collection("comments").add({ name: me.name, text: t, time: Date.now() });
        }

        function loadComments(id) {
            db.collection("posts").doc(id).collection("comments").orderBy("time","desc").limit(2).onSnapshot(snap => {
                let ch = "";
                snap.forEach(doc => { ch += `<div><b>${doc.data().name}:</b> ${doc.data().text}</div>`; });
                document.getElementById(`comm-${id}`).innerHTML = ch || "No comments yet";
            });
        }

        // --- CHAT SYSTEM ---
        function loadUsers() {
            db.collection("users").get().then(snap => {
                let h = "";
                snap.forEach(doc => {
                    if(doc.id !== auth.currentUser.uid) h += `<div class="chat-item" onclick="openC('${doc.id}', '${doc.data().name}')"><b>${doc.data().name}</b></div>`;
                });
                document.getElementById('user-list').innerHTML = h || "No users found";
            });
        }

        function openC(id, n) {
            activeC = id; document.getElementById('chat-name').innerText = n;
            show('chat-window');
            const cid = [auth.currentUser.uid, id].sort().join("_");
            db.collection("chats").doc(cid).collection("messages").orderBy("time","asc").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    h += `<div class="msg ${m.sender === auth.currentUser.uid ? 'sent' : 'rec'}">${m.text}</div>`;
                });
                const box = document.getElementById('msg-list');
                box.innerHTML = h; box.scrollTop = box.scrollHeight;
            });
        }

        async function sendM() {
            const t = document.getElementById('m-in').value; if(!t) return;
            const cid = [auth.currentUser.uid, activeC].sort().join("_");
            await db.collection("chats").doc(cid).collection("messages").add({ text: t, sender: auth.currentUser.uid, time: Date.now() });
            document.getElementById('m-in').value = "";
        }

        // --- REELS & UPLOAD ---
        function upload() {
            const t = confirm("Reel? (Cancel for Photo)") ? "reel" : "photo";
            const u = prompt("URL:");
            if(u) db.collection("posts").add({ url: u, type: t, uid: auth.currentUser.uid, username: me.name, likes: 0, time: Date.now() });
        }
    </script>
</body>
</html>
