<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-accent: #25d366; --wa-dim: #8696a0; --wa-header: #111b21; --wa-sent: #005c4b; }
        body { margin: 0; background: var(--wa-bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* SCREENS */
        #auth-screen, #app-screen, #chat-window { display: none; height: 100vh; flex-direction: column; }
        #auth-screen { justify-content: center; align-items: center; padding: 20px; text-align: center; display: flex; }

        /* UI COMPONENTS */
        .input-field { width: 100%; max-width: 300px; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #2a3942; color: white; outline: none; }
        .btn { width: 100%; max-width: 300px; padding: 12px; background: var(--wa-accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #0b141a; }

        /* CHAT LIST */
        .top-nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--wa-header); font-size: 20px; font-weight: bold; }
        .chat-item { display: flex; padding: 15px; align-items: center; border-bottom: 0.5px solid #202c33; cursor: pointer; }
        .avatar { width: 45px; height: 45px; background: #3d474c; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* REAL CHAT WINDOW */
        .chat-header { padding: 10px; background: var(--wa-header); display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #202c33; }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 70%; font-size: 14px; word-wrap: break-word; }
        .sent { background: var(--wa-sent); align-self: flex-end; }
        .recv { background: #202c33; align-self: flex-start; }
        .type-area { padding: 10px; background: var(--wa-header); display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2 style="color: var(--wa-accent)">WhatsApp</h2>
        <input type="email" id="email" class="input-field" placeholder="Email">
        <input type="password" id="pass" class="input-field" placeholder="Password">
        <button class="btn" onclick="handleAuth()">LOGIN / REGISTER</button>
    </div>

    <div id="app-screen">
        <div class="top-nav">
            <span>WhatsApp</span>
            <span onclick="logout()" style="font-size: 14px; color: var(--wa-accent)">LOGOUT</span>
        </div>
        <div style="padding: 10px; text-align: center;">
            <button class="btn" style="max-width: 90%;" onclick="addFriend()">+ ADD FRIEND (BY EMAIL)</button>
        </div>
        <div class="chat-list" id="contacts"></div>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <button onclick="backToHome()" style="background:none; border:none; color:white; font-size:20px;">←</button>
            <div class="avatar" style="width:35px; height:35px;">👤</div>
            <span id="chat-with-name">Dost</span>
        </div>
        <div id="msg-box"></div>
        <div class="type-area">
            <input type="text" id="m-input" class="input-field" style="margin:0;" placeholder="Message">
            <button class="btn" style="width:60px; margin:0;" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
          authDomain: "my-insta-backend.firebaseapp.com",
          databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com",
          projectId: "my-insta-backend",
          storageBucket: "my-insta-backend.firebasestorage.app",
          messagingSenderId: "955106968523",
          appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let currentChatUser = "";

        function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
        }

        auth.onAuthStateChanged(user => {
            document.body.querySelectorAll('div[id$="-screen"], #chat-window').forEach(d => d.style.display = 'none');
            if(user) {
                document.getElementById('app-screen').style.display = 'flex';
                loadContacts();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        function logout() { auth.signOut(); }

        function addFriend() {
            const email = prompt("Apne dost ki Email ID dalo:");
            if(email && email !== auth.currentUser.email) {
                const id = btoa(email).replace(/=/g, "");
                db.ref(`users/${auth.currentUser.uid}/friends/${id}`).set({ email: email });
                loadContacts();
            }
        }

        function loadContacts() {
            const list = document.getElementById('contacts');
            list.innerHTML = "";
            db.ref(`users/${auth.currentUser.uid}/friends`).on('value', snap => {
                list.innerHTML = "";
                snap.forEach(child => {
                    const friend = child.val();
                    const div = document.createElement('div');
                    div.className = "chat-item";
                    div.innerHTML = `<div class="avatar">👤</div><div class="chat-info"><div class="chat-name">${friend.email}</div><div class="chat-msg">Click to chat</div></div>`;
                    div.onclick = () => openChat(friend.email);
                    list.appendChild(div);
                });
            });
        }

        function openChat(email) {
            currentChatUser = email;
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-with-name').innerText = email;
            
            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box');
                box.innerHTML = "";
                snap.forEach(msg => {
                    const data = msg.val();
                    const d = document.createElement('div');
                    d.className = `msg ${data.sender === auth.currentUser.email ? 'sent' : 'recv'}`;
                    d.innerText = data.text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const input = document.getElementById('m-input');
            if(!input.value) return;
            const chatID = [auth.currentUser.email, currentChatUser].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({
                sender: auth.currentUser.email,
                text: input.value,
                time: Date.now()
            });
            input.value = "";
        }

        function backToHome() {
            document.getElementById('chat-window').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
