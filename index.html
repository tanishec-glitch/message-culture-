    <!DOCTYPE html>
<html>
<head>
    <title>Ludo Pro Test</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; }
        #board { width: 300px; height: 300px; margin: 20px auto; border: 5px solid #ecf0f1; position: relative; background: #fff; display: grid; grid-template-columns: repeat(3, 1fr); }
        .zone { border: 1px solid #ccc; height: 100px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; }
        .red { background: #ff4d4d; } .blue { background: #4d94ff; }
        #dice-btn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 20px; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>Ludo Multiplayer Test</h1>
    <div id="board">
        <div class="zone red">RED BASE</div>
        <div class="zone">PATH</div>
        <div class="zone blue">BLUE BASE</div>
    </div>

    <div id="status">Current Turn: <span id="turn-display">Loading...</span></div>
    <h2 id="dice-result">Dice: -</h2>
    <button id="dice-btn">ROLL DICE</button>

    <script>
        // 1. YOUR FIREBASE CONFIG (Paste from Console)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const gameRef = db.collection("games").doc("test-game");

        // 2. INITIALIZE GAME DATA
        async function initGame() {
            const doc = await gameRef.get();
            if (!doc.exists) {
                await gameRef.set({
                    turn: "red",
                    diceValue: 0,
                    lastRollTime: Date.now()
                });
            }
        }

        // 3. LISTEN FOR REAL-TIME UPDATES (The "Sync" Magic)
        gameRef.onSnapshot((doc) => {
            const data = doc.data();
            document.getElementById("turn-display").innerText = data.turn.toUpperCase();
            document.getElementById("dice-result").innerText = "Dice: " + data.diceValue;
            
            // Visual feedback for turn
            document.getElementById("turn-display").style.color = data.turn;
        });

        // 4. ROLL LOGIC
        document.getElementById("dice-btn").onclick = async () => {
            const newValue = Math.floor(Math.random() * 6) + 1;
            const currentDoc = await gameRef.get();
            const currentTurn = currentDoc.data().turn;

            // Switch turns
            const nextTurn = currentTurn === "red" ? "blue" : "red";

            await gameRef.update({
                diceValue: newValue,
                turn: nextTurn,
                lastRollTime: Date.now()
            });
        };

        initGame();
    </script>
</body>
</html>
