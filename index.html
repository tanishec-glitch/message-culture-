<!DOCTYPE html>
<html>
<head>
    <title>Tanish Gram - Pro Max Plus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; padding-bottom: 70px; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; font-weight: bold; font-style: italic; font-size: 22px; }
        .section { display: none; min-height: 90vh; }
        .active { display: block; }
        
        /* Story Styling */
        .story-bar { display: flex; overflow-x: auto; padding: 10px; background: white; border-bottom: 1px solid #dbdbdb; gap: 15px; }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #f09433; padding: 2px; object-fit: cover; cursor: pointer; }
        .view-count { font-size: 10px; color: gray; text-align: center; }

        /* Chat Styling */
        .chat-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: white; }
        .msg-box { height: 75vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: #f9f9f9; }
        .msg { padding: 8px 12px; border-radius: 15px; margin: 5px; max-width: 70%; position: relative; }
        .sent { background: #0095f6; color: white; align-self: flex-end; }
        .rec { background: #e4e6eb; align-self: flex-start; }
        .seen-status { font-size: 10px; align-self: flex-end; margin-right: 10px; color: #0095f6; }

        /* General UI */
        .footer { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 24px; z-index: 200; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header">
        Instagram 
        <div style="display:flex; gap:15px; font-style:normal; font-size:24px;">
            <span onclick="addStory()">📸</span>
            <span onclick="show('chat')">📩</span>
        </div>
    </div>

    <div id="feed-sec" class="section active">
        <div class="story-bar" id="story-list"></div>
        <div id="posts-list"></div>
    </div>

    <div id="reels-sec" class="section" style="background:black; height:90vh; overflow-y:scroll; scroll-snap-type:y mandatory;"></div>

    <div id="profile-sec" class="section" style="text-align:center; padding:20px;">
        <img id="p-dp" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
        <h3 id="p-name">Loading...</h3>
        <button onclick="document.getElementById('edit-modal').style.display='block'">Edit Profile</button>
        <div id="p-grid" class="grid" style="margin-top:20px;"></div>
    </div>

    <div id="chat-sec" class="section">
        <h3 style="padding:15px;">Inbox</h3>
        <div id="user-list"></div>
    </div>
    <div id="chat-window" class="section">
        <div style="padding:10px; border-bottom:1px solid #ddd;"><span onclick="show('chat')">⬅️</span> <b id="chat-name">User</b></div>
        <div id="msg-list" class="msg-box"></div>
        <div style="padding:10px; display:flex; background:white;">
            <input id="m-in" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ddd;" placeholder="Type message...">
            <button onclick="sendM()" style="border:none; background:none; color:#0095f6; font-weight:bold; margin-left:10px;">Send</button>
        </div>
    </div>

    <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:500; padding:20px;">
        <h2>Edit Profile</h2>
        <input id="en" placeholder="Name"><br><input id="eb" placeholder="Bio"><br><input id="ed" placeholder="DP URL"><br>
        <button onclick="saveP()" style="width:100%; background:#0095f6; color:white; padding:10px; border:none; margin-top:10px;">Save Changes</button>
        <button onclick="document.getElementById('edit-modal').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none;">Cancel</button>
    </div>

    <div class="footer">
        <span onclick="show('feed')">🏠</span>
        <span onclick="upload()">➕</span>
        <span onclick="show('reels')">🎬</span>
        <span onclick="show('profile')">👤</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let me = { name: "User", dp: "" };
        let activeC = "";

        auth.onAuthStateChanged(async user => {
            if (user) {
                const d = await db.collection("users").doc(user.uid).get();
                if(d.exists) me = d.data();
                show('feed');
            } else {
                let e = prompt("Email:"); let p = prompt("Password:");
                auth.signInWithEmailAndPassword(e,p).catch(()=>location.reload());
            }
        });

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            let target = document.getElementById(id + '-sec') || document.getElementById(id);
            if(target) target.classList.add('active');
            if(id === 'feed') { loadFeed(); loadS(); }
            if(id === 'reels') loadReels();
            if(id === 'profile') loadP();
            if(id === 'chat') loadU();
        }

        // --- STORY & VIEWS ---
        function addStory() {
            const u = prompt("Story Image URL:");
            if(u) db.collection("stories").add({ url: u, uid: auth.currentUser.uid, dp: me.dp, name: me.name, views: [], time: Date.now() });
        }

        function loadS() {
            const y = Date.now() - 86400000;
            db.collection("stories").where("time", ">", y).onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const s = doc.data();
                    h += `<div class="story-item" onclick="viewS('${doc.id}', '${s.url}')">
                        <img src="${s.dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="story-circle">
                        <div class="view-count">👁️ ${s.views ? s.views.length : 0}</div>
                    </div>`;
                });
                document.getElementById('story-list').innerHTML = h || "No Stories";
            });
        }

        function viewS(id, url) {
            alert("Viewing Story...");
            db.collection("stories").doc(id).update({
                views: firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid)
            });
        }

        // --- CHAT & SEEN ---
        function loadU() {
            db.collection("users").get().then(snap => {
                let h = "";
                snap.forEach(doc => {
                    if(doc.id !== auth.currentUser.uid) h += `<div class="chat-item" onclick="openC('${doc.id}', '${doc.data().name}')"><b>${doc.data().name}</b></div>`;
                });
                document.getElementById('user-list').innerHTML = h;
            });
        }

        function openC(id, n) {
            activeC = id; document.getElementById('chat-name').innerText = n;
            show('chat-window');
            const cid = [auth.currentUser.uid, id].sort().join("_");
            db.collection("chats").doc(cid).collection("messages").orderBy("time","asc").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const cl = m.sender === auth.currentUser.uid ? "sent" : "rec";
                    // Mark as seen if received
                    if(m.sender !== auth.currentUser.uid && !m.seen) db.collection("chats").doc(cid).collection("messages").doc(doc.id).update({seen: true});
                    h += `<div class="msg ${cl}">${m.text}</div>`;
                    if(cl === 'sent' && m.seen) h += `<div class="seen-status">✓ Seen</div>`;
                });
                document.getElementById('msg-list').innerHTML = h;
            });
        }

        async function sendM() {
            const t = document.getElementById('m-in').value; if(!t) return;
            const cid = [auth.currentUser.uid, activeC].sort().join("_");
            await db.collection("chats").doc(cid).collection("messages").add({ text: t, sender: auth.currentUser.uid, time: Date.now(), seen: false });
            document.getElementById('m-in').value = "";
        }

        // --- REELS, FEED, PROFILE ---
        function loadFeed() {
            db.collection("posts").where("type","==","photo").orderBy("time","desc").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div style="background:white; border-bottom:1px solid #ddd; margin-bottom:10px;">
                        <div style="padding:10px; font-weight:bold;">@${d.username}</div>
                        <img src="${d.url}" style="width:100%" ondblclick="db.collection('posts').doc('${doc.id}').update({likes: (${d.likes || 0} + 1)})">
                        <div style="padding:10px;">❤️ ${d.likes || 0} likes</div>
                    </div>`;
                });
                document.getElementById('posts-list').innerHTML = h;
            });
        }

        function loadReels() {
            db.collection("posts").where("type","==","reel").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    h += `<div style="height:90vh; scroll-snap-align:start;"><video src="${doc.data().url}" style="width:100%; height:100%; object-fit:cover;" loop autoplay muted></video></div>`;
                });
                document.getElementById('reels-sec').innerHTML = h;
            });
        }

        function loadP() {
            document.getElementById('p-name').innerText = me.name;
            document.getElementById('p-dp').src = me.dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            db.collection("posts").where("uid","==",auth.currentUser.uid).get().then(snap => {
                let gh = ""; snap.forEach(doc => gh += `<img src="${doc.data().url}">`);
                document.getElementById('p-grid').innerHTML = gh;
            });
        }

        async function saveP() {
            const up = { name: document.getElementById('en').value, bio: document.getElementById('eb').value, dp: document.getElementById('ed').value };
            await db.collection("users").doc(auth.currentUser.uid).set(up);
            alert("Saved!"); location.reload();
        }

        function upload() {
            const t = confirm("Reel? (Cancel for Photo)") ? "reel" : "photo";
            const u = prompt("URL:");
            if(u) db.collection("posts").add({ url: u, type: t, uid: auth.currentUser.uid, username: me.name, likes: 0, time: Date.now() });
        }
    </script>
</body>
</html>
