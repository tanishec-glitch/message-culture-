<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WhatsApp Pro Max v4</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-accent: #25d366; --wa-dim: #8696a0; --wa-header: #111b21; --wa-sent: #005c4b; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--wa-bg); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #auth-screen, #app-screen, #chat-window { display: none; height: 100%; flex-direction: column; width: 100%; }
        #auth-screen { justify-content: center; align-items: center; padding: 20px; display: flex; }

        .input-field { width: 100%; max-width: 300px; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #2a3942; color: white; outline: none; }
        .btn { width: 100%; max-width: 300px; padding: 12px; background: var(--wa-accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #0b141a; }

        .top-nav { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--wa-header); border-bottom: 1px solid #202c33; flex-shrink: 0; z-index: 10; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px 15px; align-items: center; border-bottom: 0.5px solid #202c33; cursor: pointer; }
        .avatar { width: 45px; height: 45px; background: #3d474c; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .online { color: var(--wa-accent); font-weight: bold; }
        .bio-text { color: var(--wa-dim); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }

        #chat-window { position: fixed; top: 0; left: 0; z-index: 1000; background: var(--wa-bg); }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; padding-bottom: 100px; }
        
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 75%; font-size: 14px; position: relative; cursor: pointer; }
        .sent { background: var(--wa-sent); align-self: flex-end; border-top-right-radius: 0; }
        .recv { background: #202c33; align-self: flex-start; border-top-left-radius: 0; }
        
        .m-info { display: flex; justify-content: flex-end; align-items: center; gap: 4px; font-size: 10px; color: #ffffff99; margin-top: 4px; }
        .type-area { position: absolute; bottom: 0; width: 100%; padding: 10px 12px 30px 12px; background: var(--wa-header); display: flex; gap: 10px; align-items: center; }
        .msg-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: #2a3942; color: white; outline: none; font-size: 16px; }
        .send-btn { width: 48px; height: 48px; background: var(--wa-accent); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #0b141a; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div>
            <h1 style="color: var(--wa-accent); font-size: 35px; margin:0;">WhatsApp</h1>
            <p style="color: var(--wa-dim)">v4.0 Live Bio</p><br>
            <input type="email" id="email" class="input-field" placeholder="Email Address">
            <input type="password" id="pass" class="input-field" placeholder="Password">
            <button class="btn" onclick="handleAuth()">LOGIN / JOIN</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="top-nav">
            <span>WhatsApp Lite</span>
            <span onclick="auth.signOut()" style="color:var(--wa-accent); font-size:12px; cursor:pointer;">LOGOUT</span>
        </div>
        <div style="padding: 12px; background: #1c2a33; border-bottom: 1px solid #25d36633;">
            <p style="font-size: 11px; color: var(--wa-accent); margin: 0 0 5px 0;">YOUR BIO STATUS:</p>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="my-bio" class="input-field" style="margin:0; flex:1; height: 40px;" placeholder="Hey there! I am using WhatsApp.">
                <button class="btn" style="width: 60px; padding: 0; height: 40px;" onclick="updateBio()">SET</button>
            </div>
        </div>
        <div style="padding: 10px;"><button class="btn" style="width: 100%; background: #25d36622; color:var(--wa-accent); border: 1px solid var(--wa-accent);" onclick="sendRequest()">+ ADD FRIEND</button></div>
        <div id="requests-area"></div>
        <div class="chat-list" id="contacts"></div>
    </div>

    <div id="chat-window">
        <div class="top-nav">
            <div style="display:flex; align-items:center; gap:12px;">
                <span onclick="backToHome()" style="font-size: 26px;">←</span>
                <div class="avatar" style="width:36px; height:36px;">👤</div>
                <div>
                    <div id="chat-with-name" style="font-size:15px; font-weight: bold;">Chat</div>
                    <div id="chat-status" style="font-size:11px; color: var(--wa-dim);">offline</div>
                </div>
            </div>
        </div>
        <div id="msg-box"></div>
        <div class="type-area">
            <input type="text" id="m-input" class="msg-input" placeholder="Type a message" oninput="handleTyping()">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
          authDomain: "my-insta-backend.firebaseapp.com",
          databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com",
          projectId: "my-insta-backend",
          storageBucket: "my-insta-backend.firebasestorage.app",
          messagingSenderId: "955106968523",
          appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let activeChat = "";

        function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
            document.getElementById('app-screen').style.display = user ? 'flex' : 'none';
            if(user) {
                const myID = btoa(user.email).replace(/[/=]/g, "");
                db.ref(`status/${myID}`).set("online");
                db.ref(`status/${myID}`).onDisconnect().set("offline");
                // Reset Typing on exit
                db.ref(`typing/${myID}`).onDisconnect().remove();
                loadData();
            }
        });

        function updateBio() {
            const bio = document.getElementById('my-bio').value;
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`users/${myID}/bio`).set(bio);
            alert("Bio Status Updated!");
        }

        function handleTyping() {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`typing/${myID}`).set(true);
            clearTimeout(window.typingTimer);
            window.typingTimer = setTimeout(() => db.ref(`typing/${myID}`).remove(), 2000);
        }

        function sendRequest() {
            const email = prompt("Dost ki Email ID:");
            if(!email || email === auth.currentUser.email) return;
            const targetID = btoa(email).replace(/[/=]/g, "");
            db.ref(`requests/${targetID}/${btoa(auth.currentUser.email).replace(/[/=]/g, "")}`).set({ from: auth.currentUser.email, status: 'pending' });
        }

        function loadData() {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            
            db.ref(`requests/${myID}`).on('value', snap => {
                const area = document.getElementById('requests-area'); area.innerHTML = "";
                snap.forEach(child => { if(child.val().status === 'pending') area.innerHTML += `<div class="request-box" style="margin:10px; padding:10px; background:#1c2a33; border-radius:8px;">New Friend: ${child.val().from}<br><button class="btn" style="padding:5px; margin-top:5px;" onclick="accept('${child.key}', '${child.val().from}')">Accept</button></div>`; });
            });

            db.ref(`friends/${myID}`).on('value', snap => {
                const list = document.getElementById('contacts'); list.innerHTML = "";
                snap.forEach(child => {
                    const fEmail = child.val().email;
                    const fID = btoa(fEmail).replace(/[/=]/g, "");
                    const div = document.createElement('div');
                    div.className = "chat-item";
                    div.innerHTML = `<div class="avatar">👤</div><div style="flex:1;"><b>${fEmail}</b><br><small id="list-bio-${fID}" class="bio-text">Loading bio...</small></div><div id="list-dot-${fID}" style="font-size:8px;">●</div>`;
                    div.onclick = () => openChat(fEmail);
                    list.appendChild(div);

                    // LIVE BIO & STATUS IN LIST
                    db.ref(`users/${fID}/bio`).on('value', b => { document.getElementById(`list-bio-${fID}`).innerText = b.val() || "Hey there! I am using WhatsApp."; });
                    db.ref(`status/${fID}`).on('value', s => { document.getElementById(`list-dot-${fID}`).style.color = s.val() === "online" ? "#25d366" : "#8696a0"; });
                });
            });
        }

        function accept(key, email) {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}/${key}`).set({email: email});
            db.ref(`friends/${key}/${myID}`).set({email: auth.currentUser.email});
            db.ref(`requests/${myID}/${key}`).remove();
        }

        function openChat(email) {
            activeChat = email;
            const fID = btoa(email).replace(/[/=]/g, "");
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-with-name').innerText = email;
            
            // LIVE STATUS & TYING & BIO IN CHAT HEADER
            db.ref(`status/${fID}`).on('value', s => {
                const statusTxt = s.val() === "online" ? "online" : "offline";
                document.getElementById('chat-status').innerText = statusTxt;
                document.getElementById('chat-status').className = s.val() === "online" ? "online" : "";
                
                db.ref(`typing/${fID}`).on('value', t => {
                    if(t.val()) { document.getElementById('chat-status').innerText = "typing..."; document.getElementById('chat-status').className = "online"; }
                    else {
                        db.ref(`users/${fID}/bio`).once('value', b => {
                            if(s.val() !== "online") document.getElementById('chat-status').innerText = b.val() || "offline";
                            else document.getElementById('chat-status').innerText = "online";
                        });
                    }
                });
            });

            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const data = m.val(); const isMe = data.sender === auth.currentUser.email;
                    const d = document.createElement('div'); d.className = `msg ${isMe ? 'sent' : 'recv'}`;
                    d.innerHTML = `${data.text}<div class="m-info">${new Date(data.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} ${isMe ? '✔✔' : ''}</div>`;
                    d.onclick = () => { if(isMe && confirm("Delete?")) db.ref(`chats/${chatID}/${m.key}`).remove(); };
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({sender: auth.currentUser.email, text: i.value, time: Date.now()});
            i.value = "";
            db.ref(`typing/${btoa(auth.currentUser.email).replace(/[/=]/g, "")}`).remove();
        }

        function backToHome() { document.getElementById('chat-window').style.display = 'none'; }
    </script>
</body>
</html>
