<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Lite Fix</title>
    <style>
        :root { 
            --bg: #0b141a; --header: #111b21; --text: #ffffff; 
            --accent: #25d366; --dim: #8696a0; --sent: #005c4b; --recv: #202c33;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
        }
        
        /* HEADER - Ek Line Mein Set */
        .top-nav { 
            height: 60px; padding: 0 15px; display: flex; justify-content: space-between; 
            align-items: center; background: var(--header); border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        .action-area { padding: 15px; flex-shrink: 0; }
        .chat-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        .chat-item { 
            display: flex; padding: 12px 15px; align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .avatar { 
            width: 50px; height: 50px; background: var(--accent); border-radius: 50%; 
            margin-right: 15px; display: flex; align-items: center; justify-content: center; 
            font-size: 20px; color: #000; font-weight: bold; flex-shrink: 0;
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-info b { display: block; font-size: 16px; margin-bottom: 2px; }
        .chat-info small { color: var(--dim); display: block; overflow: hidden; text-overflow: ellipsis; }

        /* CHAT WINDOW FIX */
        #chat-window { 
            position: fixed; inset: 0; z-index: 2000; background: var(--bg); 
            display: none; flex-direction: column; 
        }
        #msg-box { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-size: cover; padding-bottom: 100px; 
        }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 15px; }
        .sent { background: var(--sent); align-self: flex-end; border-top-right-radius: 0; }
        .recv { background: var(--recv); align-self: flex-start; border-top-left-radius: 0; }

        .type-area { 
            position: absolute; bottom: 0; width: 100%; padding: 10px 15px 30px; 
            background: var(--header); display: flex; gap: 10px; align-items: center; 
        }
        .msg-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: #2a3942; color: #fff; outline: none; }
        .btn { 
            width: 100%; padding: 12px; background: var(--accent); border: none; 
            border-radius: 10px; font-weight: bold; cursor: pointer; color: #0b141a; text-align: center;
        }

        #auth-screen { height: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="width: 100%; max-width: 320px; text-align: center;">
            <h1 style="color:var(--accent); margin-bottom: 20px;">WhatsApp Lite</h1>
            <input type="email" id="email" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; background:#2a3942; color:white;" placeholder="Email">
            <input type="password" id="pass" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:none; background:#2a3942; color:white;" placeholder="Password">
            <button class="btn" onclick="handleAuth()">LOGIN / SIGNUP</button>
        </div>
    </div>

    <div id="app-screen" style="display: none; flex-direction: column; height: 100%;">
        <div class="top-nav">
            <b style="font-size: 20px;">WhatsApp Lite</b>
            <div style="display:flex; gap:15px; align-items:center;">
                <span onclick="auth.signOut()" style="color:var(--accent); font-weight:bold; cursor:pointer;">LOGOUT</span>
            </div>
        </div>
        <div class="action-area">
            <button class="btn" onclick="addFriend()">+ ADD NEW FRIEND</button>
        </div>
        <div class="chat-list" id="contacts"></div>
    </div>

    <div id="chat-window">
        <div class="top-nav">
            <div style="display:flex; align-items:center; gap:12px;">
                <span onclick="backHome()" style="font-size:24px; cursor:pointer;">←</span>
                <b id="chat-title">Chat</b>
            </div>
        </div>
        <div id="msg-box"></div>
        <div class="type-area">
            <input type="text" id="m-input" class="msg-input" placeholder="Message">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; font-size:20px; cursor:pointer;">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04", authDomain: "my-insta-backend.firebaseapp.com", databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com", projectId: "my-insta-backend", storageBucket: "my-insta-backend.firebasestorage.app", messagingSenderId: "955106968523", appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.database();
        let activeChat = "";

        function handleAuth() { const e = document.getElementById('email').value, p = document.getElementById('pass').value; auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p)); }
        
        auth.onAuthStateChanged(user => {
            document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
            document.getElementById('app-screen').style.display = user ? 'flex' : 'none';
            if(user) loadFriends();
        });

        function loadFriends() {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}`).on('value', snap => {
                const list = document.getElementById('contacts'); list.innerHTML = "";
                snap.forEach(child => {
                    const data = child.val();
                    const name = data.nickname || data.email;
                    const div = document.createElement('div');
                    div.className = "chat-item";
                    div.innerHTML = `
                        <div class="avatar">${name[0].toUpperCase()}</div>
                        <div class="chat-info" onclick="openChat('${data.email}', '${name}')">
                            <b>${name}</b>
                            <small>${data.email}</small>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }

        function openChat(email, name) {
            activeChat = email;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = name;
            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = document.createElement('div');
                    d.className = `msg ${m.val().sender === auth.currentUser.email ? 'sent' : 'recv'}`;
                    d.innerText = m.val().text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({ sender: auth.currentUser.email, text: i.value, time: Date.now() });
            i.value = "";
        }

        function addFriend() {
            const email = prompt("Friend's Email:"); if(!email) return;
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            const tID = btoa(email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}/${tID}`).set({ email: email });
            db.ref(`friends/${tID}/${myID}`).set({ email: auth.currentUser.email });
        }
        function backHome() { document.getElementById('chat-window').style.display = 'none'; }
    </script>
</body>
</html>
