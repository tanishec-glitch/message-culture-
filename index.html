<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Lite Pro</title>
    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-header: #0b141a;
            --wa-accent: #25d366;
            --wa-text: #e9edef;
            --wa-dim: #8696a0;
            --wa-card: #111b21;
        }

        body { margin: 0; background: var(--wa-bg); color: var(--wa-text); font-family: sans-serif; }

        /* HEADER */
        .top-nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 22px; font-weight: bold; }

        /* SEARCH BAR */
        .search-container { padding: 0 15px 15px 15px; }
        .search-bar { width: 100%; padding: 12px; border-radius: 25px; border: none; background: #202c33; color: white; outline: none; box-sizing: border-box; }

        /* CHAT LIST */
        .chat-list { display: flex; flex-direction: column; }
        .chat-item { display: flex; padding: 15px; align-items: center; border-bottom: 0.5px solid #202c33; }
        .avatar { width: 50px; height: 50px; background: #666; border-radius: 50%; margin-right: 15px; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .chat-msg { font-size: 14px; color: var(--wa-dim); }
        .chat-meta { text-align: right; }
        .time { font-size: 12px; color: var(--wa-accent); }
        .unread { background: var(--wa-accent); color: black; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; }

        /* FLOATING BUTTON */
        .fab { position: fixed; bottom: 80px; right: 20px; background: var(--wa-accent); width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #0b141a; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--wa-card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #202c33; }
        .nav-item { text-align: center; color: var(--wa-dim); font-size: 12px; }
        .nav-item.active { color: var(--wa-text); font-weight: bold; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <span>WhatsApp</span>
        <div style="font-size: 18px; display: flex; gap: 20px;">
            <span>📷</span><span>🔍</span><span>⋮</span>
        </div>
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Ask Meta AI or Search">
    </div>

    <div class="chat-list">
        <div class="chat-item">
            <div class="avatar" style="background: #128c7e;"></div>
            <div class="chat-info">
                <div class="chat-name">EC B Oriental Unofficial</div>
                <div class="chat-msg">Acha..</div>
            </div>
            <div class="chat-meta">
                <div class="time">10:56</div>
                <span class="unread">13</span>
            </div>
        </div>

        <div class="chat-item">
            <div class="avatar"></div>
            <div class="chat-info">
                <div class="chat-name">Nepali</div>
                <div class="chat-msg">Nepali reacted ❤️ to "Vese bhi nahi..."</div>
            </div>
            <div class="chat-meta">
                <div class="time" style="color: gray;">Yesterday</div>
            </div>
        </div>
    </div>

    <div class="fab">💬</div>

    <div class="bottom-nav">
        <div class="nav-item active"><div class="nav-icon">💬</div>Chats</div>
        <div class="nav-item"><div class="nav-icon">⭕</div>Updates</div>
        <div class="nav-item"><div class="nav-icon">👥</div>Communities</div>
        <div class="nav-item"><div class="nav-icon">📞</div>Calls</div>
    </div>

</body>
</html>
