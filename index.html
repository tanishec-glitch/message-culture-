<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinCash VIP - Rummy Modern Clone</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #1a0202; --card: #2d0505; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; overflow: hidden; }
        
        .screen { position: fixed; top: 0; width: 100%; height: 100%; display: none; flex-direction: column; background: url('https://www.transparenttextures.com/patterns/dark-matter.png'), linear-gradient(to bottom, #4e0505, #1a0202); }
        .active { display: flex; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--gold); }
        .user-info { display: flex; align-items: center; gap: 8px; }
        .avatar { width: 40px; height: 40px; border: 2px solid var(--gold); border-radius: 50%; }
        .balance-box { background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; }

        /* GAME GRID */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; overflow-y: auto; flex: 1; padding-bottom: 80px; }
        .game-card { background: var(--card); border: 2px solid #5a0a0a; border-radius: 12px; position: relative; overflow: hidden; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .game-card:active { transform: scale(0.95); }
        .game-card img { width: 100%; display: block; border-bottom: 1px solid #5a0a0a; }
        .game-card p { margin: 5px; text-align: center; font-size: 12px; font-weight: bold; color: #ccc; }
        .tag-hot { position: absolute; top: 5px; right: 5px; background: red; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; animation: blink 1s infinite; }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--gold); z-index: 100; }
        .nav-item { text-align: center; color: #888; font-size: 10px; text-decoration: none; border: none; background: none; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 3px; }
        .shop-btn { background: linear-gradient(to bottom, #ffd700, #ff8c00); color: black !important; padding: 8px 20px; border-radius: 20px; font-weight: bold; border: none; }

        /* MODALS */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; display:none; justify-content:center; align-items:center; }
        .modal-content { background:#222; width:85%; padding:20px; border-radius:15px; border:1px solid var(--gold); text-align:center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; }
        .btn-main { width: 100%; padding: 12px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* DVT SCREEN */
        .dvt-area { flex: 1; background: #06402b; display: flex; flex-direction: column; position: relative; }
        .bet-zones { display: grid; grid-template-columns: 1fr 0.6fr 1fr; gap: 10px; padding: 10px; height: 180px; margin-top: auto; margin-bottom: 80px; }
        .zone { border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .zone.dragon { background: rgba(0,0,255,0.3); border-color: blue; }
        .zone.tiger { background: rgba(255,0,0,0.3); border-color: red; }
        .zone.tie { background: rgba(0,128,0,0.3); border-color: green; }
    </style>
</head>
<body>

    <div id="lobby-scr" class="screen active">
        <div class="header">
            <div class="user-info">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar">
                <div>
                    <div style="font-size: 10px; color: #aaa;">ID: 5560124</div>
                    <div class="balance-box">₹ <span id="wall-bal">0.00</span></div>
                </div>
            </div>
            <button onclick="adminLogin()" style="background:none; border:none; color:#333;">🛡️</button>
        </div>

        <div class="game-grid">
            <div class="game-card" onclick="openGame('dvt')">
                <span class="tag-hot">HOT</span>
                <img src="https://img.freepik.com/premium-photo/dragon-tiger-mascot-logo-design_1029473-12496.jpg">
                <p>Dragon vs Tiger</p>
            </div>
            <div class="game-card">
                <img src="https://img.freepik.com/free-vector/casino-gamble-composition-with-dice-chips_1284-18542.jpg">
                <p>7 Up Down</p>
            </div>
            <div class="game-card">
                <img src="https://img.freepik.com/free-vector/pixel-art-mysterious-treasure-chest_1284-52422.jpg">
                <p>Mines</p>
            </div>
            <div class="game-card">
                <img src="https://img.freepik.com/free-vector/luxury-car-concept-illustration_114360-14995.jpg">
                <p>Car Roulette</p>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-item"><i>📢</i>Notice</button>
            <button class="nav-item"><i>🤝</i>Share</button>
            <button class="shop-btn" onclick="showModal('add-modal')">SHOP</button>
            <button class="nav-item" onclick="showModal('wit-modal')"><i>💸</i>Withdraw</button>
            <button class="nav-item"><i>⚙️</i>Setting</button>
        </div>
    </div>

    <div id="dvt-scr" class="screen">
        <div class="header">
            <button onclick="backToLobby()" style="background:none; border:none; color:gold; font-size:20px;">←</button>
            <b>Dragon vs Tiger</b>
            <div class="balance-box">₹ <span id="game-bal">0.00</span></div>
        </div>
        <div class="dvt-area">
            <div style="display:flex; justify-content:center; gap:50px; margin-top:40px;">
                <div id="card-d" style="width:70px; height:100px; background:white; border-radius:5px; border:2px solid gold; color:black; display:flex; justify-content:center; align-items:center; font-size:24px;">?</div>
                <div id="card-t" style="width:70px; height:100px; background:white; border-radius:5px; border:2px solid gold; color:black; display:flex; justify-content:center; align-items:center; font-size:24px;">?</div>
            </div>
            
            <div class="bet-zones">
                <div class="zone dragon" onclick="placeBet('dragon')">DRAGON<br>1:1</div>
                <div class="zone tie" onclick="placeBet('tie')">TIE<br>1:8</div>
                <div class="zone tiger" onclick="placeBet('tiger')">TIGER<br>1:1</div>
            </div>
        </div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold)">Add Chips 🪙</h3>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=YOUR_UPI@okicici&pn=WinCash" style="border:3px solid white; border-radius:10px;">
            <input type="number" id="dep-amt" placeholder="Amount (Min ₹100)">
            <input type="text" id="dep-utr" placeholder="12 Digit UTR / Ref No.">
            <button class="btn-main" onclick="submitDeposit()">Submit Deposit</button>
            <button onclick="hideModal('add-modal')" style="background:none; border:none; color:gray; margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="wit-modal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold)">Withdraw Money 💸</h3>
            <input type="text" id="wit-upi" placeholder="Your UPI ID">
            <input type="number" id="wit-amt" placeholder="Min ₹200">
            <button class="btn-main" onclick="submitWithdraw()">Request Withdraw</button>
            <button onclick="hideModal('wit-modal')" style="background:none; border:none; color:gray; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <script>
        // 1. CONFIG (Apni Firebase details yahan dalo)
        const firebaseConfig = {
            apiKey: "AIza...",
            authDomain: "your-app.firebaseapp.com",
            databaseURL: "https://your-app-default-rtdb.firebaseio.com",
            projectId: "your-app",
            storageBucket: "your-app.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. NAVIGATION
        function openGame(game) {
            document.getElementById('lobby-scr').classList.remove('active');
            document.getElementById(game + '-scr').classList.add('active');
        }
        function backToLobby() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('lobby-scr').classList.add('active');
        }
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).style.display = 'none'; }

        // 3. LOGIC (Fake for testing, replace with real logic)
        function submitDeposit() {
            alert("Deposit Request Sent! Wait for Admin approval.");
            hideModal('add-modal');
        }

        function adminLogin() {
            let p = prompt("Enter Admin Pass:");
            if(p === "tanish123") alert("Admin Panel logic will be here!");
        }
    </script>
</body>
</html>
