<!DOCTYPE html>
<html>
<head>
    <title>Tanish Gram - Stories Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; padding-bottom: 70px; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; font-weight: bold; font-style: italic; font-size: 22px; }
        
        /* Story Bar Style */
        .story-bar { display: flex; overflow-x: auto; padding: 10px; background: white; border-bottom: 1px solid #dbdbdb; gap: 15px; scrollbar-width: none; }
        .story-item { text-align: center; flex-shrink: 0; cursor: pointer; }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #f09433; padding: 2px; object-fit: cover; background: white; }
        .story-name { font-size: 11px; margin-top: 4px; color: #262626; }

        /* Full Screen Story Overlay */
        #story-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000; text-align:center; }
        .story-img { width: 100%; height: 100%; object-fit: contain; }
        .story-progress { position:absolute; top:10px; left:5%; width:90%; height:2px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; width:0%; transition: width linear; }

        /* General Styles */
        .footer { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 24px; z-index: 200; }
        .section { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div class="header">Instagram <span onclick="addStory()" style="font-size:24px; font-style:normal;">📸</span></div>

    <div id="story-overlay" onclick="closeStory()">
        <div class="story-progress"><div id="p-fill" class="progress-fill"></div></div>
        <img id="s-img" class="story-img">
    </div>

    <div id="feed-sec" class="section active">
        <div class="story-bar" id="story-list">
            </div>
        <div id="posts-list"></div>
    </div>

    <div class="footer">
        <span onclick="show('feed')">🏠</span>
        <span onclick="upload()">➕</span>
        <span onclick="alert('Reels Working!')">🎬</span>
        <span onclick="location.reload()">👤</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let userData = { name: "User", dp: "" };

        auth.onAuthStateChanged(async user => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists) userData = doc.data();
                loadStories();
                loadFeed();
            }
        });

        // --- STORY LOGIC ---
        function addStory() {
            const url = prompt("Paste Story Image URL:");
            if(url) {
                db.collection("stories").add({
                    url: url,
                    uid: auth.currentUser.uid,
                    username: userData.name || "User",
                    dp: userData.dp || "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    time: Date.now()
                }).then(() => alert("Story Added!"));
            }
        }

        function loadStories() {
            const yesterday = Date.now() - (24 * 60 * 60 * 1000);
            db.collection("stories").where("time", ">", yesterday).onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    const s = doc.data();
                    html += `
                        <div class="story-item" onclick="viewStory('${s.url}')">
                            <img src="${s.dp}" class="story-circle">
                            <div class="story-name">${s.username}</div>
                        </div>`;
                });
                document.getElementById('story-list').innerHTML = html || "<p style='font-size:12px; color:gray;'>No Stories</p>";
            });
        }

        let storyTimer;
        function viewStory(url) {
            const overlay = document.getElementById('story-overlay');
            const img = document.getElementById('s-img');
            const fill = document.getElementById('p-fill');
            
            img.src = url;
            overlay.style.display = 'block';
            fill.style.width = '0%';
            
            setTimeout(() => fill.style.width = '100%', 100);
            storyTimer = setTimeout(closeStory, 5000); // 5 Seconds story
        }

        function closeStory() {
            document.getElementById('story-overlay').style.display = 'none';
            clearTimeout(storyTimer);
        }

        // --- FEED LOGIC (Same as before) ---
        function loadFeed() {
            db.collection("posts").where("type","==","photo").orderBy("time","desc").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div style="background:white; border-bottom:1px solid #ddd; margin-bottom:10px;">
                        <div style="padding:10px; font-weight:bold;">@${d.username}</div>
                        <img src="${d.url}" style="width:100%">
                    </div>`;
                });
                document.getElementById('posts-list').innerHTML = h;
            });
        }

        function upload() {
            const url = prompt("Photo URL:");
            if(url) db.collection("posts").add({
                url: url, type: "photo", uid: auth.currentUser.uid, username: userData.name, time: Date.now()
            });
        }
    </script>
</body>
</html>
