<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro Max v13</title>
    <style>
        :root { --bg: #0b141a; --header: #111b21; --text: #ffffff; --accent: #25d366; --dim: #8696a0; --sent: #005c4b; --recv: #202c33; }
        .light-mode { --bg: #f0f2f5; --header: #ffffff; --text: #111b21; --sent: #dcf8c6; --recv: #ffffff; --dim: #667781; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER & TABS */
        .top-nav { height: 60px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; background: var(--header); border-bottom: 1px solid rgba(0,0,0,0.1); }
        .status-row { display: flex; overflow-x: auto; padding: 10px 15px; gap: 12px; background: var(--header); border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
        .status-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--accent); padding: 2px; flex-shrink: 0; }
        .status-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px 15px; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .avatar-container { position: relative; margin-right: 15px; }
        .avatar { width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #000; font-weight: bold; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .online-dot { width: 12px; height: 12px; background: #25d366; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; border: 2px solid var(--bg); display: none; }

        /* CHAT WINDOW */
        #chat-window { position: fixed; inset: 0; z-index: 2000; background: var(--bg); display: none; flex-direction: column; }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; padding-bottom: 100px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 15px; position: relative; }
        .sent { background: var(--sent); align-self: flex-end; border-top-right-radius: 0; }
        .recv { background: var(--recv); align-self: flex-start; border-top-left-radius: 0; }
        
        /* VOICE NOTE STYLE */
        .voice-note { display: flex; align-items: center; gap: 10px; min-width: 150px; }
        .voice-bar { height: 3px; flex: 1; background: rgba(255,255,255,0.3); border-radius: 2px; }

        .type-area { position: absolute; bottom: 0; width: 100%; padding: 10px 15px 30px; background: var(--header); display: flex; gap: 10px; align-items: center; }
        .msg-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: rgba(100,100,100,0.1); color: var(--text); outline: none; }
        .icon-btn { font-size: 22px; cursor: pointer; color: var(--dim); }

        /* MODAL */
        #profile-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--header); padding: 25px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; }
    </style>
</head>
<body class="dark-mode">

    <div id="profile-modal">
        <div class="modal-content">
            <h3 style="margin-bottom:15px;">Edit Profile</h3>
            <input type="text" id="p-name" class="msg-input" style="width:100%; margin-bottom:10px;" placeholder="Your Name">
            <input type="text" id="p-img" class="msg-input" style="width:100%; margin-bottom:20px;" placeholder="Photo URL">
            <button onclick="saveProfile()" class="msg-input" style="background:var(--accent); color:black; font-weight:bold;">Save Changes</button>
            <p onclick="closeProfile()" style="margin-top:15px; cursor:pointer; font-size:12px; color:var(--dim);">Cancel</p>
        </div>
    </div>

    <div id="auth-screen" style="height:100%; display:flex; justify-content:center; align-items:center;">
        <div style="text-align:center;">
            <h1 style="color:var(--accent); font-size:40px;">WhatsApp v13</h1>
            <input type="email" id="email" class="msg-input" style="width:280px; margin-bottom:10px;" placeholder="Email">
            <input type="password" id="pass" class="msg-input" style="width:280px; margin-bottom:20px;" placeholder="Password">
            <button onclick="handleAuth()" style="width:280px; padding:12px; background:var(--accent); border:none; border-radius:10px; font-weight:bold;">LOGIN</button>
        </div>
    </div>

    <div id="app-screen" style="display:none; flex-direction:column; height:100%;">
        <div class="top-nav">
            <div onclick="openProfile()" style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                <div class="avatar" style="width:35px; height:35px;" id="my-avatar-mini">👤</div>
                <b id="my-name-display">WhatsApp Lite</b>
            </div>
            <div style="display:flex; gap:12px;">
                <span onclick="toggleTheme()" id="t-btn" style="cursor:pointer; font-size:18px;">☀️</span>
                <span onclick="auth.signOut()" style="color:var(--accent); font-weight:bold; cursor:pointer; font-size:12px;">LOGOUT</span>
            </div>
        </div>
        <div class="status-row" id="status-bar">
            <div class="status-circle" onclick="alert('Upload status feature coming soon!')">
                <div style="width:100%; height:100%; background:#2a3942; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px;">+</div>
            </div>
        </div>
        <div style="padding:15px;"><button onclick="addFriend()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:10px; font-weight:bold; color:black;">+ ADD NEW FRIEND</button></div>
        <div class="chat-list" id="contacts"></div>
    </div>

    <div id="chat-window">
        <div class="top-nav">
            <div style="display:flex; align-items:center; gap:12px;">
                <span onclick="backHome()" style="font-size:24px; cursor:pointer;">←</span>
                <b id="chat-title">Chat</b>
                <small id="typing-status" style="color:var(--accent); font-size:11px; display:none; margin-left:5px;">typing...</small>
            </div>
        </div>
        <div id="msg-box"></div>
        <div class="type-area">
            <span class="icon-btn" onclick="sendVoice()">🎙️</span>
            <input type="text" id="m-input" class="msg-input" placeholder="Message" oninput="isTyping()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; font-size:20px;">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04", authDomain: "my-insta-backend.firebaseapp.com", databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com", projectId: "my-insta-backend", storageBucket: "my-insta-backend.firebasestorage.app", messagingSenderId: "955106968523", appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.database();
        let activeChat = "", myID = "";

        function handleAuth() { const e = document.getElementById('email').value, p = document.getElementById('pass').value; auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p)); }
        function toggleTheme() { document.body.classList.toggle('light-mode'); document.getElementById('t-btn').innerText = document.body.classList.contains('light-mode') ? "🌙" : "☀️"; }
        
        auth.onAuthStateChanged(user => {
            document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
            document.getElementById('app-screen').style.display = user ? 'flex' : 'none';
            if(user) {
                myID = btoa(user.email).replace(/[/=]/g, "");
                db.ref(`status/${myID}`).set("online");
                db.ref(`status/${myID}`).onDisconnect().remove();
                loadProfile(); loadFriends();
            }
        });

        function openProfile() { document.getElementById('profile-modal').style.display = 'flex'; }
        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }
        function saveProfile() {
            const name = document.getElementById('p-name').value;
            const img = document.getElementById('p-img').value;
            db.ref(`profiles/${myID}`).set({ name, img });
            closeProfile();
        }

        function loadProfile() {
            db.ref(`profiles/${myID}`).on('value', s => {
                if(s.val()) {
                    document.getElementById('my-name-display').innerText = s.val().name || "WhatsApp Lite";
                    if(s.val().img) document.getElementById('my-avatar-mini').innerHTML = `<img src="${s.val().img}">`;
                }
            });
        }

        function loadFriends() {
            db.ref(`friends/${myID}`).on('value', snap => {
                const list = document.getElementById('contacts'); list.innerHTML = "";
                snap.forEach(child => {
                    const email = child.val().email; const fID = btoa(email).replace(/[/=]/g, "");
                    const div = document.createElement('div'); div.className = "chat-item";
                    div.innerHTML = `<div class="avatar-container"><div class="avatar" id="av-${fID}">${email[0].toUpperCase()}</div><div class="online-dot" id="dot-${fID}"></div></div>
                                     <div style="flex:1" onclick="openChat('${email}')"><b id="name-${fID}">${email}</b></div>`;
                    list.appendChild(div);
                    // Load Friend Profile
                    db.ref(`profiles/${fID}`).on('value', p => {
                        if(p.val()) {
                            if(p.val().name) document.getElementById(`name-${fID}`).innerText = p.val().name;
                            if(p.val().img) document.getElementById(`av-${fID}`).innerHTML = `<img src="${p.val().img}">`;
                        }
                    });
                    db.ref(`status/${fID}`).on('value', s => { if(document.getElementById(`dot-${fID}`)) document.getElementById(`dot-${fID}`).style.display = s.val() ? "block" : "none"; });
                });
            });
        }

        function openChat(email) {
            activeChat = email; document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = email;
            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = document.createElement('div'); d.className = `msg ${m.val().sender === auth.currentUser.email ? 'sent' : 'recv'}`;
                    d.innerHTML = m.val().voice ? `<div class="voice-note">🎙️ <div class="voice-bar"></div> 0:05</div>` : m.val().text;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function isTyping() { db.ref(`typing/${myID}`).set(activeChat); clearTimeout(window.tOut); window.tOut = setTimeout(() => db.ref(`typing/${myID}`).remove(), 2000); }
        function sendMsg() { 
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({ sender: auth.currentUser.email, text: i.value, time: Date.now() });
            i.value = ""; 
        }
        function sendVoice() {
            const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({ sender: auth.currentUser.email, voice: true, time: Date.now() });
        }
        function addFriend() { const e = prompt("Friend Email:"); if(e) { const tID = btoa(e).replace(/[/=]/g, ""); db.ref(`friends/${myID}/${tID}`).set({email:e}); db.ref(`friends/${tID}/${myID}`).set({email:auth.currentUser.email}); }}
        function backHome() { document.getElementById('chat-window').style.display = 'none'; }
    </script>
</body>
</html>
