<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Lite v12</title>
    <style>
        :root { 
            --bg: #0b141a; --header: #111b21; --text: #ffffff; 
            --accent: #25d366; --dim: #8696a0; --sent: #005c4b; --recv: #202c33;
        }
        .light-mode {
            --bg: #f0f2f5; --header: #ffffff; --text: #111b21;
            --sent: #dcf8c6; --recv: #ffffff; --dim: #667781;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .top-nav { 
            height: 60px; padding: 0 15px; display: flex; justify-content: space-between; 
            align-items: center; background: var(--header); border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .theme-btn { 
            background: rgba(255,255,255,0.1); border: none; padding: 8px 12px; 
            border-radius: 20px; color: var(--text); cursor: pointer; font-size: 14px;
        }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { 
            display: flex; padding: 12px 15px; align-items: center; 
            border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer;
        }
        .avatar-container { position: relative; margin-right: 15px; }
        .avatar { 
            width: 50px; height: 50px; background: var(--accent); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px; color: #000; font-weight: bold;
        }
        .online-dot { 
            width: 12px; height: 12px; background: #25d366; border-radius: 50%; 
            position: absolute; bottom: 2px; right: 2px; border: 2px solid var(--bg);
            display: none;
        }
        .chat-info { flex: 1; }
        #chat-window { 
            position: fixed; inset: 0; z-index: 2000; background: var(--bg); 
            display: none; flex-direction: column; 
        }
        #msg-box { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-size: cover; padding-bottom: 100px;
        }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; font-size: 15px; }
        .sent { background: var(--sent); align-self: flex-end; border-top-right-radius: 0; }
        .recv { background: var(--recv); align-self: flex-start; border-top-left-radius: 0; }
        .type-area { 
            position: absolute; bottom: 0; width: 100%; padding: 10px 15px 30px; 
            background: var(--header); display: flex; gap: 10px; align-items: center; 
        }
        .msg-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: rgba(100,100,100,0.1); color: var(--text); outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" style="height:100%; display:flex; justify-content:center; align-items:center; padding:20px;">
        <div style="width:100%; max-width:320px; text-align:center;">
            <h1 style="color:var(--accent)">WhatsApp v12</h1>
            <input type="email" id="email" class="msg-input" style="width:100%; margin-bottom:10px;" placeholder="Email">
            <input type="password" id="pass" class="msg-input" style="width:100%; margin-bottom:20px;" placeholder="Password">
            <button class="btn" onclick="handleAuth()">LOGIN</button>
        </div>
    </div>

    <div id="app-screen" style="display:none; flex-direction:column; height:100%;">
        <div class="top-nav">
            <b style="font-size: 18px;">WhatsApp Lite</b>
            <div style="display:flex; gap:10px;">
                <button class="theme-btn" onclick="toggleTheme()" id="t-btn">☀️ Light</button>
                <span onclick="auth.signOut()" style="color:var(--accent); font-weight:bold; cursor:pointer; font-size:12px; padding-top:8px;">LOGOUT</span>
            </div>
        </div>
        <div style="padding:15px;"><button class="btn" onclick="addFriend()">+ ADD FRIEND</button></div>
        <div class="chat-list" id="contacts"></div>
    </div>

    <div id="chat-window">
        <div class="top-nav">
            <div style="display:flex; align-items:center; gap:12px;">
                <span onclick="backHome()" style="font-size:24px; cursor:pointer;">←</span>
                <div>
                    <b id="chat-title">Chat</b><br>
                    <small id="typing-status" style="color:var(--accent); font-size:11px; display:none;">typing...</small>
                </div>
            </div>
        </div>
        <div id="msg-box"></div>
        <div class="type-area">
            <input type="text" id="m-input" class="msg-input" placeholder="Message" oninput="isTyping()">
            <button onclick="sendMsg()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:50%; font-size:20px;">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04", authDomain: "my-insta-backend.firebaseapp.com", databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com", projectId: "my-insta-backend", storageBucket: "my-insta-backend.firebasestorage.app", messagingSenderId: "955106968523", appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.database();
        let activeChat = "", myEmailID = "";

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('t-btn').innerText = isLight ? "🌙 Dark" : "☀️ Light";
        }

        function handleAuth() { const e = document.getElementById('email').value, p = document.getElementById('pass').value; auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p)); }
        
        auth.onAuthStateChanged(user => {
            document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
            document.getElementById('app-screen').style.display = user ? 'flex' : 'none';
            if(user) {
                myEmailID = btoa(user.email).replace(/[/=]/g, "");
                db.ref(`status/${myEmailID}`).set("online");
                db.ref(`status/${myEmailID}`).onDisconnect().remove();
                loadFriends();
            }
        });

        function loadFriends() {
            db.ref(`friends/${myEmailID}`).on('value', snap => {
                const list = document.getElementById('contacts'); list.innerHTML = "";
                snap.forEach(child => {
                    const data = child.val(); const fID = btoa(data.email).replace(/[/=]/g, "");
                    const div = document.createElement('div'); div.className = "chat-item";
                    div.innerHTML = `<div class="avatar-container"><div class="avatar">${data.email[0].toUpperCase()}</div><div class="online-dot" id="dot-${fID}"></div></div>
                                     <div class="chat-info" onclick="openChat('${data.email}')"><b>${data.email}</b></div>`;
                    list.appendChild(div);
                    db.ref(`status/${fID}`).on('value', s => { 
                        const dot = document.getElementById(`dot-${fID}`);
                        if(dot) dot.style.display = s.val() === "online" ? "block" : "none";
                    });
                });
            });
        }

        function openChat(email) {
            activeChat = email; document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = email;
            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            const fID = btoa(email).replace(/[/=]/g, "");
            
            db.ref(`typing/${fID}`).on('value', s => {
                document.getElementById('typing-status').style.display = (s.val() === auth.currentUser.email) ? "block" : "none";
            });

            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = document.createElement('div'); d.className = `msg ${m.val().sender === auth.currentUser.email ? 'sent' : 'recv'}`;
                    d.innerText = m.val().text; box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function isTyping() {
            db.ref(`typing/${myEmailID}`).set(activeChat);
            clearTimeout(window.tOut);
            window.tOut = setTimeout(() => db.ref(`typing/${myEmailID}`).remove(), 2000);
        }

        function sendMsg() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({ sender: auth.currentUser.email, text: i.value, time: Date.now() });
            i.value = ""; db.ref(`typing/${myEmailID}`).remove();
        }

        function addFriend() {
            const email = prompt("Friend's Email:"); if(!email) return;
            const tID = btoa(email).replace(/[/=]/g, "");
            db.ref(`friends/${myEmailID}/${tID}`).set({ email: email });
            db.ref(`friends/${tID}/${myEmailID}`).set({ email: auth.currentUser.email });
        }
        function backHome() { document.getElementById('chat-window').style.display = 'none'; }
    </script>
</body>
</html>
