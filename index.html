<!DOCTYPE html>
<html>
<head>
    <title>Instagram Pro - Tanish</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fafafa; padding-bottom: 70px; }
        /* Auth Screen Style */
        .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: white; }
        .auth-box { width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 5px; box-sizing: border-box; }
        .btn-blue { width: 100%; padding: 12px; background: #0095f6; color: white; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* App Style */
        #main-app { display: none; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .post { background: white; border: 1px solid #dbdbdb; margin: 10px auto; max-width: 470px; }
        .post-header { padding: 10px; display: flex; align-items: center; font-weight: 600; font-size: 14px; }
        .dp-small { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; object-fit: cover; background: #eee; }
        .post-img { width: 100%; display: block; }
        .post-info { padding: 12px; font-size: 14px; }
        
        /* Profile Modal */
        #profile-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:500; padding:20px; box-sizing:border-box; }
        .footer-nav { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 26px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <h1 style="font-style: italic; font-size: 35px;">Instagram</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-blue" onclick="handleAuth('signup')">Sign Up</button>
            <button onclick="handleAuth('login')" style="background:none; border:none; color:#0095f6; margin-top:15px; font-weight:bold;">Log In</button>
        </div>
    </div>

    <div id="profile-modal">
        <h2 style="text-align:center">Edit Profile</h2>
        <input type="text" id="edit-name" placeholder="Full Name">
        <input type="text" id="edit-bio" placeholder="Bio">
        <input type="text" id="edit-dp" placeholder="Profile Picture URL">
        <button class="btn-blue" onclick="saveProfile()">Save Changes</button>
        <button onclick="closeProfile()" style="background:none; border:none; color:grey; width:100%; margin-top:15px;">Cancel</button>
    </div>

    <div id="main-app">
        <div class="header">
            <div style="font-style: italic; font-size: 22px; font-weight: bold;">Instagram</div>
            <span onclick="openProfile()">⚙️</span>
        </div>
        <div id="feed"></div>
        <div class="footer-nav">
            <span onclick="location.reload()">🏠</span>
            <span onclick="addNewPost()" style="color:#0095f6;">➕</span>
            <span onclick="auth.signOut().then(()=>location.reload())">🚪</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let userData = { name: "User", dp: "", bio: "" };

        auth.onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                const doc = await db.collection("users").doc(user.uid).get();
                if (doc.exists) userData = doc.data();
                loadFeed();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Email/Password bhariye!");
            if(type === 'signup') auth.createUserWithEmailAndPassword(e, p).catch(a => alert(a.message));
            else auth.signInWithEmailAndPassword(e, p).catch(a => alert(a.message));
        }

        function openProfile() { 
            document.getElementById('edit-name').value = userData.name || "";
            document.getElementById('edit-bio').value = userData.bio || "";
            document.getElementById('edit-dp').value = userData.dp || "";
            document.getElementById('profile-modal').style.display = 'block'; 
        }
        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }

        async function saveProfile() {
            userData = {
                name: document.getElementById('edit-name').value || "User",
                bio: document.getElementById('edit-bio').value || "",
                dp: document.getElementById('edit-dp').value || ""
            };
            await db.collection("users").doc(auth.currentUser.uid).set(userData);
            alert("Profile Updated!");
            location.reload();
        }

        function loadFeed() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                let html = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    html += `
                        <div class="post">
                            <div class="post-header">
                                <img src="${d.userDp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="dp-small">
                                <div>${d.username}</div>
                            </div>
                            <img src="${d.url}" class="post-img">
                            <div class="post-info">
                                <b>${d.likes || 0} likes</b><br>
                                <b>${d.username}</b> ${d.caption || ""}
                            </div>
                        </div>`;
                });
                document.getElementById('feed').innerHTML = html;
            });
        }

        function addNewPost() {
            const url = prompt("Photo URL:");
            const cap = prompt("Caption:");
            if (url) {
                db.collection("posts").add({
                    url: url,
                    caption: cap || "",
                    username: userData.name || auth.currentUser.email.split('@')[0],
                    userDp: userData.dp || "",
                    likes: 0,
                    time: Date.now()
                });
            }
        }
    </script>
</body>
</html>
