function loadReels() {
    db.collection("posts").where("type", "==", "reel").onSnapshot(snap => {
        let h = "";
        snap.forEach(doc => {
            const d = doc.data();
            h += `
                <div style="background:black; margin-bottom:10px;">
                    <video src="${d.url}" style="width:100%; height:80vh; object-fit:cover;" controls autoplay loop muted></video>
                    <div style="color:white; padding:10px;">@${d.username}</div>
                </div>`;
        });
        document.getElementById('reels-sec').innerHTML = h || "<p style='color:white; text-align:center;'>No Reels yet</p>";
    });
}
