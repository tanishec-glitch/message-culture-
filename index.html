<!DOCTYPE html>
<html>
<head>
    <title>Tanish Instagram Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; background: #fafafa; padding-bottom: 70px; }
        .header { background: white; border-bottom: 1px solid #dbdbdb; padding: 12px; text-align: center; position: sticky; top: 0; font-style: italic; z-index:100; font-size: 22px;}
        .post { background: white; border: 1px solid #dbdbdb; margin: 15px auto; max-width: 450px; }
        .post-img { width: 100%; display: block; min-height: 200px; background: #eee; }
        .user-info { padding: 10px; font-weight: bold; }
        .footer { background: white; border-top: 1px solid #dbdbdb; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0; font-size: 26px; z-index:100; }
        .plus-btn { color: #0095f6; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">Instagram Pro</div>
    
    <div id="feed">
        <p style="text-align:center; padding:50px;">Loading your posts...</p>
    </div>

    <div class="footer">
        <span onclick="location.reload()">🏠</span>
        <span class="plus-btn" onclick="addNewPost()">➕</span>
        <span>👤</span>
    </div>

    <script>
        // AAPKA REAL FIREBASE CONFIG (Updated with your keys)
        const firebaseConfig = {
          apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
          authDomain: "my-insta-backend.firebaseapp.com",
          projectId: "my-insta-backend",
          storageBucket: "my-insta-backend.firebasestorage.app",
          messagingSenderId: "955106968523",
          appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. DATABASE SE POSTS KHINCHNA
        db.collection("posts").orderBy("time", "desc").onSnapshot((snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            if (snapshot.empty) {
                feed.innerHTML = "<p style='text-align:center; padding:50px;'>No posts yet. Tap ➕ to post!</p>";
            }
            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <div class="user-info">tanishec_glitch</div>
                        <img src="${data.url}" class="post-img">
                    </div>`;
            });
        });

        // 2. NAYA POST SAVE KARNA
        function addNewPost() {
            const url = prompt("Google se kisi photo ka link copy karke yahan paste karein:");
            if (url && url.startsWith("http")) {
                db.collection("posts").add({
                    url: url,
                    time: Date.now()
                }).then(() => {
                    console.log("Post saved!");
                }).catch((error) => {
                    alert("Error! Shayad Firestore Database 'Test Mode' mein nahi hai.");
                    console.error(error);
                });
            } else if (url) {
                alert("Please valid image URL daalein (http se shuru hone wala).");
            }
        }
    </script>
</body>
</html>
