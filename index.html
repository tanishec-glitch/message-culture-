<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram Pro - Tanish</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --border: #262626; --accent: #0095f6; --gray: #8e8e8e; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        .header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; height: 44px; }
        .logo { font-size: 22px; font-weight: bold; font-style: italic; }
        
        .section { display: none; padding-bottom: 60px; min-height: 100vh; }
        .active { display: block; }

        /* Profile Style */
        .profile-top { padding: 20px 15px; display: flex; align-items: center; }
        .p-stats { display: flex; justify-content: space-around; flex: 1; text-align: center; }
        .stat-num { font-weight: bold; font-size: 18px; }
        .stat-label { font-size: 12px; color: var(--gray); }
        .btn-blue { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 8px; font-weight: 600; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-gray { background: var(--border); color: white; border: none; padding: 8px; border-radius: 8px; font-weight: 600; flex: 1; cursor: pointer; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #1a1a1a; cursor: pointer; }

        /* Chat */
        .msg-box { height: 80vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { padding: 10px 15px; border-radius: 20px; margin: 4px; max-width: 75%; font-size: 14px; }
        .sent { background: var(--accent); align-self: flex-end; }
        .rec { background: var(--border); align-self: flex-start; }

        .footer { background: var(--bg); border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; font-size: 26px; z-index: 200; }
        input { background: #121212; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 5px; width: 90%; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Instagram</div>
        <div style="display:flex; gap:18px;">
            <span onclick="show('search')">🔍</span>
            <span onclick="show('chat')">📩</span>
        </div>
    </div>

    <div id="feed-sec" class="section active">
        <div id="posts-list"></div>
    </div>

    <div id="search-sec" class="section" style="padding:15px;">
        <input type="text" id="user-search" placeholder="Search friends..." oninput="realTimeSearch(this.value)">
        <div id="search-results" style="margin-top:20px;"></div>
    </div>

    <div id="profile-sec" class="section">
        <div class="profile-top">
            <img id="p-dp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">
            <div class="p-stats">
                <div><div class="stat-num" id="post-count">0</div><div class="stat-label">posts</div></div>
                <div><div class="stat-num" id="follower-count">0</div><div class="stat-label">followers</div></div>
                <div><div class="stat-num">0</div><div class="stat-label">following</div></div>
            </div>
        </div>
        <div style="padding:0 15px;">
            <b id="p-name">Username</b><br>
            <span id="p-bio" style="font-size:14px;">Breathe. Believe. Begin. 🌿</span>
            <div style="display:flex; gap:5px; margin-top:15px;">
                <button class="btn-gray" onclick="openEditModal()">Edit profile</button>
                <button class="btn-gray">Share profile</button>
            </div>
        </div>
        <div class="grid" id="p-grid" style="margin-top:20px;"></div>
    </div>

    <div id="chat-sec" class="section">
        <div id="chat-list"></div>
    </div>
    <div id="chat-window" class="section">
        <div class="header"><span onclick="show('chat')">⬅️</span> <b id="chat-title">Chat</b></div>
        <div id="msg-list" class="msg-box"></div>
        <div style="padding:10px; display:flex; gap:5px;">
            <input id="m-in" placeholder="Message...">
            <button onclick="sendMsg()" style="color:var(--accent); border:none; background:none; font-weight:bold;">Send</button>
        </div>
    </div>

    <div class="footer">
        <span onclick="show('feed')">🏠</span>
        <span onclick="upload()">➕</span>
        <span onclick="show('profile')">👤</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let me = { name: "User", dp: "", bio: "" };
        let currentChatUid = "";

        auth.onAuthStateChanged(async user => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists) me = doc.data();
                else await db.collection("users").doc(user.uid).set({name: user.email.split('@')[0], dp: "", bio: "", followers: 0});
                show('feed');
            } else {
                let e = prompt("Email:"), p = prompt("Password:");
                auth.signInWithEmailAndPassword(e,p).catch(()=>location.reload());
            }
        });

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-sec') ? document.getElementById(id + '-sec').classList.add('active') : document.getElementById(id).classList.add('active');
            if(id === 'feed') loadFeed();
            if(id === 'profile') loadMyProfile();
            if(id === 'chat') loadChatUsers();
        }

        // --- REAL-TIME SEARCH ---
        async function realTimeSearch(val) {
            if(!val) { document.getElementById('search-results').innerHTML = ""; return; }
            const snap = await db.collection("users").get();
            let h = "";
            snap.forEach(doc => {
                const u = doc.data();
                if(u.name.toLowerCase().includes(val.toLowerCase())) {
                    h += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${u.dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:40px; height:40px; border-radius:50%;">
                            <b>${u.name}</b>
                        </div>
                        <button onclick="followUser('${doc.id}')" style="background:var(--accent); color:white; border:none; padding:5px 15px; border-radius:5px;">Follow</button>
                    </div>`;
                }
            });
            document.getElementById('search-results').innerHTML = h;
        }

        async function followUser(uid) {
            await db.collection("users").doc(uid).update({ followers: firebase.firestore.FieldValue.increment(1) });
            alert("Following!");
        }

        // --- PROFILE FUNCTIONS ---
        async function loadMyProfile() {
            document.getElementById('p-name').innerText = me.name;
            document.getElementById('p-bio').innerText = me.bio || "Breathe. Believe. Begin. 🌿";
            document.getElementById('p-dp').src = me.dp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            
            const pSnap = await db.collection("posts").where("uid", "==", auth.currentUser.uid).get();
            document.getElementById('post-count').innerText = pSnap.size;
            
            const uDoc = await db.collection("users").doc(auth.currentUser.uid).get();
            document.getElementById('follower-count').innerText = uDoc.data().followers || 0;

            let gh = "";
            pSnap.forEach(doc => gh += `<img src="${doc.data().url}" class="grid-item">`);
            document.getElementById('p-grid').innerHTML = gh;
        }

        function openEditModal() {
            const n = prompt("New Name:", me.name);
            const b = prompt("New Bio:", me.bio);
            const d = prompt("New DP URL:", me.dp);
            if(n) {
                db.collection("users").doc(auth.currentUser.uid).update({name: n, bio: b, dp: d}).then(()=>location.reload());
            }
        }

        // --- FEED & CHAT ---
        function loadFeed() {
            db.collection("posts").orderBy("time", "desc").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div style="border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:10px;">
                        <div style="padding:10px; font-weight:bold;">@${d.username}</div>
                        <img src="${d.url}" style="width:100%;" ondblclick="alert('Liked!')">
                        <div style="padding:10px;">❤️ ${d.likes || 0} likes</div>
                    </div>`;
                });
                document.getElementById('posts-list').innerHTML = h;
            });
        }

        function upload() {
            const u = prompt("Image URL:");
            if(u) db.collection("posts").add({url: u, uid: auth.currentUser.uid, username: me.name, time: Date.now(), likes: 0});
        }
    </script>
</body>
</html>
