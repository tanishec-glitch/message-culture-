<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Pro</title>
    <style>
        :root { --wa-bg: #0b141a; --wa-accent: #25d366; --wa-dim: #8696a0; }
        body { margin: 0; background: var(--wa-bg); color: white; font-family: sans-serif; overflow-x: hidden; }
        
        /* AUTH SCREEN */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .input-field { width: 100%; max-width: 300px; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #2a3942; color: white; }
        .btn { width: 100%; max-width: 300px; padding: 12px; background: var(--wa-accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* MAIN APP INTERFACE */
        #app-screen { display: none; flex-direction: column; height: 100vh; }
        .top-nav { padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: bold; }
        .search-bar { margin: 0 15px 15px; padding: 12px; border-radius: 25px; border: none; background: #202c33; color: white; }
        
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 15px; align-items: center; border-bottom: 0.5px solid #202c33; cursor: pointer; }
        .chat-item:active { background: #202c33; }
        .avatar { width: 50px; height: 50px; background: #3d474c; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* FLOATING BUTTON */
        .fab { position: fixed; bottom: 85px; right: 20px; background: var(--wa-accent); width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #0b141a; border: none; }

        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111b21; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #202c33; }
        .nav-item { text-align: center; color: var(--wa-dim); font-size: 11px; cursor: pointer; }
        .active-nav { color: white; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2 style="color: var(--wa-accent)">WhatsApp Lite</h2>
        <input type="email" id="email" class="input-field" placeholder="Email">
        <input type="password" id="pass" class="input-field" placeholder="Password">
        <button class="btn" onclick="handleAuth()">Login / Register</button>
        <p id="err" style="color: red; font-size: 12px;"></p>
    </div>

    <div id="app-screen">
        <div class="top-nav">
            <span>WhatsApp</span>
            <div style="display: flex; gap: 20px;"><span>📷</span><span onclick="alert('Search Open')">🔍</span><span onclick="logout()">⋮</span></div>
        </div>

        <input type="text" class="search-bar" placeholder="Ask Meta AI or Search">

        <div class="chat-list" id="contacts">
            </div>

        <button class="fab" onclick="alert('New Chat Start!')">💬</button>

        <div class="bottom-nav">
            <div class="nav-item active-nav">💬<br>Chats</div>
            <div class="nav-item" onclick="alert('Status Section')">⭕<br>Updates</div>
            <div class="nav-item" onclick="alert('Groups Section')">👥<br>Communities</div>
            <div class="nav-item" onclick="alert('Calls Section')">📞<br>Calls</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // PASTE YOUR REAL CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "...",
            databaseURL: "...",
            projectId: "...",
            storageBucket: "...",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => {
                auth.createUserWithEmailAndPassword(e, p).catch(err => document.getElementById('err').innerText = err.message);
            });
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                loadUsers();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        function logout() { auth.signOut(); }

        // SIRF ASLI USERS KO LOAD KARNA
        function loadUsers() {
            const list = document.getElementById('contacts');
            list.innerHTML = ""; // Purane "Example" contacts delete
            
            // Database se users uthana (Testing ke liye ek self-chat add kar rahe)
            const myEmail = auth.currentUser.email;
            let item = `<div class="chat-item" onclick="alert('Opening Chat with Me')">
                <div class="avatar">👤</div>
                <div class="chat-info">
                    <div class="chat-name">${myEmail} (You)</div>
                    <div class="chat-msg">Tap to message yourself</div>
                </div>
            </div>`;
            list.innerHTML = item;
        }
    </script>
</body>
</html>
