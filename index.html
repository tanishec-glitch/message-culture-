<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram Pro - Tanish</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #000; --border: #262626; --accent: #0095f6; --text: #fff; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }
        
        .header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 44px; }
        .footer { background: var(--bg); border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; font-size: 24px; z-index: 1000; }
        .section { display: none; padding-bottom: 70px; min-height: 100vh; }
        .active { display: block; }

        /* Posts & Stories */
        .story-bar { display: flex; overflow-x: auto; padding: 10px; gap: 15px; border-bottom: 1px solid var(--border); }
        .story-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fd1d1d; padding: 2px; object-fit: cover; }
        .post-card { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
        .post-img { width: 100%; display: block; background: #1a1a1a; }
        
        /* Profile Grid */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; }
        
        /* Notifications & Chat */
        .notif-item { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .msg-box { height: 75vh; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 18px; margin: 4px; max-width: 70%; font-size: 14px; }
        .sent { background: var(--accent); align-self: flex-end; }
        .rec { background: var(--border); align-self: flex-start; }

        /* Modals */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:5000; overflow-y:auto; }
        input { background: #121212; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 5px; width: 85%; margin: 8px auto; display: block; }
    </style>
</head>
<body>

    <div id="auth-sec" class="section active" style="text-align:center; padding-top:100px;">
        <h1 style="font-style: italic; font-size: 40px;">Instagram</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="authOp('login')" style="background:var(--accent); color:white; border:none; padding:12px; width:90%; border-radius:5px; font-weight:bold; margin-top:10px;">Log In</button>
        <p onclick="authOp('reg')" style="color:var(--accent); cursor:pointer; margin-top:20px;">Don't have an account? Sign Up</p>
    </div>

    <div id="main-header" class="header" style="display:none;">
        <div style="font-size: 22px; font-weight: bold; font-style: italic;">Instagram</div>
        <div style="display:flex; gap:18px;">
            <span onclick="go('notif')">❤️</span>
            <span onclick="go('chat')">📩</span>
        </div>
    </div>

    <div id="feed" class="section">
        <div class="story-bar" id="s-list"></div>
        <div id="f-list"></div>
    </div>

    <div id="notif" class="section">
        <h3 style="padding:15px; margin:0;">Notifications</h3>
        <div id="n-list"></div>
    </div>

    <div id="profile" class="section">
        <div style="padding: 20px 15px; display: flex; align-items: center; gap: 20px;">
            <img id="my-dp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:75px; height:75px; border-radius:50%; object-fit:cover;">
            <div style="display:flex; flex:1; justify-content:space-around; text-align:center;">
                <div><b id="p-count">0</b><br><small>posts</small></div>
                <div><b>267</b><br><small>followers</small></div>
                <div><b>258</b><br><small>following</small></div>
            </div>
        </div>
        <div style="padding:0 15px;"><b id="my-name">User</b></div>
        <button onclick="editP()" style="background:var(--border); color:white; border:none; padding:8px; width:94%; margin:15px 3%; border-radius:5px;">Edit Profile</button>
        <div class="grid" id="p-grid"></div>
    </div>

    <div id="chat" class="section">
        <h3 style="padding:15px;">Messages</h3>
        <div id="u-list"></div>
    </div>

    <div id="chat-win" class="section">
        <div class="header"><span onclick="go('chat')">⬅️</span> <b id="cw-name">User</b></div>
        <div id="m-list" class="msg-box"></div>
        <div style="padding:10px; display:flex; background:black;"><input id="m-in" style="flex:1;"><button onclick="sendM()" style="color:var(--accent); background:none; border:none; font-weight:bold; padding:10px;">Send</button></div>
    </div>

    <div id="modal">
        <div class="header"><span onclick="closeM()">⬅️</span> <b>Details</b></div>
        <div id="v-content"></div>
    </div>

    <div id="main-footer" class="footer" style="display:none;">
        <span onclick="go('feed')">🏠</span>
        <span onclick="upMenu()">➕</span>
        <span onclick="go('profile')">👤</span>
        <span onclick="firebase.auth().signOut()" style="color:red; font-size:12px;">Logout</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let me = {}; let activeChat = "";

        // --- AUTH ---
        function authOp(type) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(type === 'reg') {
                auth.createUserWithEmailAndPassword(e,p).then(u => {
                    db.collection("users").doc(u.user.uid).set({name: e.split('@')[0], dp: "", followers: 267, time: Date.now()});
                }).catch(err => alert(err.message));
            } else {
                auth.signInWithEmailAndPassword(e,p).catch(err => alert(err.message));
            }
        }

        auth.onAuthStateChanged(async user => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                me = doc.data(); me.uid = user.uid;
                document.getElementById('auth-sec').classList.remove('active');
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('main-footer').style.display = 'flex';
                go('feed');
            } else {
                document.getElementById('auth-sec').classList.add('active');
                document.getElementById('main-header').style.display = 'none';
                document.getElementById('main-footer').style.display = 'none';
            }
        });

        // --- CORE NAVIGATION ---
        function go(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'feed') { loadF(); loadS(); }
            if(id === 'profile') loadP();
            if(id === 'chat') loadU();
            if(id === 'notif') loadN();
        }

        // --- FEATURES ---
        function upMenu() {
            const t = prompt("1.Photo 2.Reel 3.Story");
            const u = prompt("URL:");
            if(!u) return;
            const coll = (t=="3")?"stories":"posts";
            db.collection(coll).add({url:u, uid:me.uid, username:me.name, dp:me.dp, type:(t=="2"?"reel":"photo"), likes:0, time:Date.now()});
        }

        function loadF() {
            db.collection("posts").where("type","==","photo").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div class="post-card"><div style="padding:10px; font-weight:bold;">@${d.username}</div>
                    <img src="${d.url}" class="post-img" ondblclick="likePost('${doc.id}','${d.uid}',${d.likes})">
                    <div style="padding:10px;">❤️ ${d.likes||0} likes <span onclick="comment('${doc.id}')">💬</span></div></div>`;
                });
                document.getElementById('f-list').innerHTML = h;
            });
        }

        async function likePost(pid, ownerUid, curLikes) {
            await db.collection("posts").doc(pid).update({likes: curLikes + 1});
            if(ownerUid !== me.uid) {
                db.collection("notifs").add({to: ownerUid, from: me.name, msg: "liked your post", time: Date.now()});
            }
        }

        function loadN() {
            db.collection("notifs").where("to","==",me.uid).orderBy("time","desc").onSnapshot(snap => {
                let h = ""; snap.forEach(doc => { h += `<div class="notif-item"><b>${doc.data().from}</b> ${doc.data().msg}</div>`; });
                document.getElementById('n-list').innerHTML = h || "<p style='padding:20px;'>No new notifications</p>";
            });
        }

        async function loadP() {
            document.getElementById('my-name').innerText = me.name;
            document.getElementById('my-dp').src = me.dp || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            const snap = await db.collection("posts").where("uid","==",me.uid).get();
            document.getElementById('p-count').innerText = snap.size;
            let gh = ""; snap.forEach(doc => gh += `<img src="${doc.data().url}" class="grid-img" onclick="viewP('${doc.id}')">`);
            document.getElementById('p-grid').innerHTML = gh;
        }

        async function viewP(id) {
            const d = (await db.collection("posts").doc(id).get()).data();
            document.getElementById('v-content').innerHTML = `<img src="${d.url}" class="post-img">
            <button onclick="delP('${id}')" style="color:red; background:none; border:none; padding:20px; width:100%; font-weight:bold;">Delete Post</button>`;
            document.getElementById('modal').style.display = 'block';
        }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        async function delP(id) { if(confirm("Delete?")) { await db.collection("posts").doc(id).delete(); closeM(); loadP(); } }

        function loadU() {
            db.collection("users").get().then(snap => {
                let h = ""; snap.forEach(doc => { if(doc.id != me.uid) h += `<div onclick="openC('${doc.id}','${doc.data().name}')" style="padding:15px; border-bottom:1px solid #222;">${doc.data().name}</div>`; });
                document.getElementById('u-list').innerHTML = h;
            });
        }

        function openC(id, name) {
            activeChat = id; document.getElementById('cw-name').innerText = name; go('chat-win');
            const cid = [me.uid, id].sort().join("_");
            db.collection("chats").doc(cid).collection("messages").orderBy("time","asc").onSnapshot(snap => {
                let h = ""; snap.forEach(doc => h += `<div class="msg ${doc.data().sender==me.uid?'sent':'rec'}">${doc.data().text}</div>`);
                const b = document.getElementById('m-list'); b.innerHTML = h; b.scrollTop = b.scrollHeight;
            });
        }

        function sendM() {
            const t = document.getElementById('m-in').value; if(!t) return;
            const cid = [me.uid, activeChat].sort().join("_");
            db.collection("chats").doc(cid).collection("messages").add({text:t, sender:me.uid, time:Date.now()});
            document.getElementById('m-in').value = "";
        }
    </script>
</body>
</html>
