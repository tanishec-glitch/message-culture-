<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinCash - Play & Earn</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #ffd700; --dark: #121212; --card: #1e1e1e; }
        body { margin: 0; font-family: sans-serif; background: var(--dark); color: white; overflow: hidden; }
        .screen { position: fixed; top: 0; width: 100%; height: 100%; display: none; flex-direction: column; }
        .active { display: flex; }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-gold { background: var(--gold); color: #000; }
        .header { background: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); }
        .game-card { background: var(--card); margin: 10px; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:100; }
        .modal-box { background: #222; padding: 20px; border-radius: 10px; width: 85%; text-align: center; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="auth-scr" class="screen active" style="justify-content:center; align-items:center;">
        <h2 style="color:var(--gold)">WinCash Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn btn-gold" onclick="handleAuth('login')">LOGIN</button>
        <button class="btn" onclick="handleAuth('reg')" style="color:var(--gold); background:none; margin-top:10px;">Register New Account</button>
    </div>

    <div id="main-scr" class="screen">
        <div class="header">
            <div onclick="adminTrigger()" style="cursor:pointer;">
                <b id="display-name">User</b><br>
                <small style="color:gray;">ID: <span id="display-id">...</span></small>
            </div>
            <div style="text-align:right;">
                <b style="color:var(--gold);">₹ <span id="wall-bal">0</span></b><br>
                <small onclick="logout()" style="color:red;">Logout</small>
            </div>
        </div>
        <div style="overflow-y:auto; flex:1;">
            <div class="game-card" onclick="showGame('dvt')">
                <h3>Dragon vs Tiger 🐯</h3>
                <p>Play & Win 2X Cash</p>
            </div>
            <div class="game-card" onclick="showGame('7up')">
                <h3>7 Up Down 🎲</h3>
                <p>Dice Betting Game</p>
            </div>
        </div>
        <div style="display:flex; padding:10px; gap:10px; background:#000;">
            <button class="btn btn-gold" style="flex:1;" onclick="toggleModal('add-modal', true)">DEPOSIT</button>
            <button class="btn" style="flex:1; background:#333; color:white;" onclick="toggleModal('wit-modal', true)">WITHDRAW</button>
        </div>
    </div>

    <div id="dvt-scr" class="screen" style="background:#06402b;">
        <div class="header">
            <button onclick="showScreen('main-scr')" style="background:none; border:none; color:gold;">Back</button>
            <b>Dragon vs Tiger</b>
            <span>₹<span id="game-bal">0</span></span>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <div style="display:flex; gap:30px; margin-bottom:50px;">
                <div id="card-d" style="width:60px; height:80px; background:white; color:black; border-radius:5px; display:flex; justify-content:center; align-items:center; font-size:24px; font-weight:bold;">?</div>
                <div id="card-t" style="width:60px; height:80px; background:white; color:black; border-radius:5px; display:flex; justify-content:center; align-items:center; font-size:24px; font-weight:bold;">?</div>
            </div>
            <div style="display:flex; gap:10px; width:90%;">
                <button onclick="bet('dragon')" style="flex:1; padding:30px; background:blue; color:white; border:none; border-radius:10px;">DRAGON</button>
                <button onclick="bet('tiger')" style="flex:1; padding:30px; background:red; color:white; border:none; border-radius:10px;">TIGER</button>
            </div>
        </div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-box">
            <h3>Add Money 💰</h3>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=9691506119@ibl" style="border-radius:10px;">
            <p>Scan & Pay, then enter UTR</p>
            <input type="number" id="dep-amt" placeholder="Amount (Min 100)">
            <input type="text" id="dep-utr" placeholder="12 Digit UTR">
            <button class="btn btn-gold" onclick="submitDep()">SUBMIT</button>
            <button onclick="toggleModal('add-modal', false)" style="background:none; border:none; color:gray; margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="wit-modal" class="modal">
        <div class="modal-box">
            <h3>Withdraw 💸</h3>
            <input type="text" id="wit-upi" placeholder="UPI ID (abc@ybl)">
            <input type="number" id="wit-amt" placeholder="Min Amount 200">
            <button class="btn btn-gold" onclick="submitWit()">WITHDRAW</button>
            <button onclick="toggleModal('wit-modal', false)" style="background:none; border:none; color:gray; margin-top:10px;">Close</button>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-box" style="max-height:80%; overflow-y:auto;">
            <h3 style="color:gold;">Admin Panel 🛡️</h3>
            <div id="admin-list" style="text-align:left; font-size:12px;"></div>
            <button class="btn" onclick="toggleModal('admin-modal', false)" style="background:red; color:white; margin-top:20px;">EXIT</button>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG (Paste your own here) ---
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            databaseURL: "https://your-app-rtdb.firebaseio.com",
            projectId: "your-app",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;
        let myBal = 0;

        // --- AUTH SYSTEM ---
        function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(type === 'reg') {
                auth.createUserWithEmailAndPassword(e, p).then(u => {
                    db.ref('users/' + u.user.uid).set({ balance: 500, email: e });
                    alert("Account Created! 500 Bonus Added.");
                }).catch(err => alert(err.message));
            } else {
                auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                currentUser = user;
                showScreen('main-scr');
                document.getElementById('display-id').innerText = user.uid.substr(0,8);
                db.ref('users/' + user.uid + '/balance').on('value', s => {
                    myBal = s.val() || 0;
                    document.getElementById('wall-bal').innerText = myBal.toFixed(2);
                    document.getElementById('game-bal').innerText = myBal.toFixed(2);
                });
            } else { showScreen('auth-scr'); }
        });

        function logout() { auth.signOut(); }

        // --- UI HELPERS ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
        function showGame(g) { if(g === 'dvt') showScreen('dvt-scr'); else alert("Coming Soon!"); }

        // --- GAME LOGIC ---
        function bet(side) {
            if(myBal < 10) return alert("Low Balance!");
            db.ref('users/' + currentUser.uid).update({ balance: myBal - 10 });
            setTimeout(() => {
                const d = Math.floor(Math.random() * 13) + 1;
                const t = Math.floor(Math.random() * 13) + 1;
                document.getElementById('card-d').innerText = d;
                document.getElementById('card-t').innerText = t;
                const win = d > t ? 'dragon' : (t > d ? 'tiger' : 'tie');
                if(side === win) db.ref('users/' + currentUser.uid).update({ balance: (myBal - 10) + 20 });
                alert("Winner: " + win.toUpperCase());
            }, 1000);
        }

        // --- DEPOSIT & WITHDRAW ---
        function submitDep() {
            const a = document.getElementById('dep-amt').value;
            const u = document.getElementById('dep-utr').value;
            if(a < 100 || u.length < 12) return alert("Check Details!");
            db.ref('admin/requests').push({ uid: currentUser.uid, amt: Number(a), utr: u, type: 'dep', status: 'pending' });
            alert("Sent to Admin!"); toggleModal('add-modal', false);
        }

        function submitWit() {
            const a = document.getElementById('wit-amt').value;
            const u = document.getElementById('wit-upi').value;
            if(a < 200 || a > myBal) return alert("Check Balance/Amount!");
            db.ref('users/' + currentUser.uid).update({ balance: myBal - a });
            db.ref('admin/requests').push({ uid: currentUser.uid, amt: Number(a), upi: u, type: 'wit', status: 'pending' });
            alert("Request Placed!"); toggleModal('wit-modal', false);
        }

        // --- ADMIN PANEL ---
        let clicks = 0;
        function adminTrigger() {
            clicks++;
            if(clicks >= 3) {
                if(prompt("Pass:") === "tanish123") { toggleModal('admin-modal', true); loadAdmin(); }
                clicks = 0;
            }
        }

        function loadAdmin() {
            db.ref('admin/requests').on('value', snap => {
                let h = "";
                snap.forEach(c => {
                    const r = c.val();
                    if(r.status === 'pending') {
                        h += `<div style="border-bottom:1px solid #444; padding:10px;">
                            ${r.type.toUpperCase()} | ₹${r.amt} | ${r.uid.substr(0,5)}<br>
                            ${r.type === 'dep' ? 'UTR: '+r.utr : 'UPI: '+r.upi}
                            <button onclick="approve('${c.key}','${r.uid}',${r.amt},'${r.type}')" style="background:green; color:white;">Approve</button>
                        </div>`;
                    }
                });
                document.getElementById('admin-list').innerHTML = h || "No pending requests.";
            });
        }

        function approve(key, uid, amt, type) {
            if(type === 'dep') db.ref('users/' + uid + '/balance').transaction(b => (b || 0) + amt);
            db.ref('admin/requests/' + key).update({ status: 'done' });
            alert("Done!");
        }
    </script>
</body>
</html>
