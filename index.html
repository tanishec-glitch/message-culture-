<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinCash Pro - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0b0e11; --card: #1c2127; --text: #e9edef; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); -webkit-user-select: none; }
        
        /* Header & Wallet */
        .header { background: #1c2127; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .wallet-btn { background: linear-gradient(90deg, #f39c12, #f1c40f); color: #000; padding: 6px 15px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: pointer; border: none; }

        /* Banner Slider (Static for now) */
        .banner { margin: 15px; height: 120px; background: linear-gradient(45deg, #1e3a8a, #3b82f6); border-radius: 12px; display: flex; align-items: center; justify-content: center; text-align: center; border: 1px solid #444; }

        /* Game Grid */
        .section-title { padding: 0 15px; font-size: 18px; font-weight: bold; color: var(--gold); margin-bottom: 10px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px 80px 15px; }
        .game-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; position: relative; transition: 0.2s; }
        .game-card:active { transform: scale(0.95); }
        .game-img { width: 100%; height: 100px; background: #2c343f; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .game-info { padding: 10px; text-align: center; font-weight: bold; font-size: 14px; }
        .tag { position: absolute; top: 5px; right: 5px; background: #e74c3c; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1c2127; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--gold); }

        /* Overlay for screens */
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 200; overflow-y: auto; }
        .screen.active { display: block; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="header">
            <div style="font-weight: bold; font-size: 20px; font-style: italic;">WinCash🏆</div>
            <button class="wallet-btn" onclick="openScreen('wallet-screen')">
                <span>🪙</span> <span id="main-bal">0.00</span>
            </button>
        </div>

        <div class="banner">
            <div>
                <h3 style="margin:0;">Joining Bonus ₹50! 🎁</h3>
                <p style="font-size: 12px; margin: 5px 0 0;">Add ₹100 & Get ₹20 Extra</p>
            </div>
        </div>

        <div class="section-title">All Games</div>
        <div class="game-grid">
            <div class="game-card" onclick="play('Snakes & Ladders')">
                <div class="tag">PvP</div>
                <div class="game-img">🐍</div>
                <div class="game-info">Snakes & Ladders</div>
            </div>
            <div class="game-card" onclick="play('Dragon vs Tiger')">
                <div class="tag" style="background:#f39c12">Hot</div>
                <div class="game-img">🐉</div>
                <div class="game-info">Dragon vs Tiger</div>
            </div>
            <div class="game-card" onclick="play('Andar Bahar')">
                <div class="game-img">🃏</div>
                <div class="game-info">Andar Bahar</div>
            </div>
            <div class="game-card" onclick="play('Spin the Wheel')">
                <div class="game-img">🎡</div>
                <div class="game-info">Spin the Wheel</div>
            </div>
            <div class="game-card" onclick="play('Ludo')">
                <div class="game-img">🎲</div>
                <div class="game-info">Ludo King</div>
            </div>
            <div class="game-card" onclick="play('Crash')">
                <div class="game-img">🚀</div>
                <div class="game-info">Crash Game</div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active">🏠<br>Home</div>
            <div class="nav-item" onclick="openScreen('earn-screen')">🔗<br>Refer</div>
            <div class="nav-item" onclick="openScreen('wallet-screen')">💸<br>Wallet</div>
            <div class="nav-item" onclick="auth.signOut()">👤<br>Logout</div>
        </div>
    </div>

    <div id="wallet-screen" class="screen">
        <div class="header">
            <span onclick="closeScreen('wallet-screen')" style="font-size: 24px;">←</span>
            <b>Wallet & Payments</b>
            <span></span>
        </div>
        <div style="padding: 20px; text-align: center;">
            <p>Available Balance</p>
            <h1 style="color:var(--gold); font-size: 40px;">₹<span id="screen-bal">0</span></h1>
            <button style="width:100%; padding:15px; background:#27ae60; border:none; color:white; border-radius:10px; font-weight:bold; margin-bottom:10px;">ADD CASH (Min ₹100)</button>
            <button style="width:100%; padding:15px; background:#e74c3c; border:none; color:white; border-radius:10px; font-weight:bold;">WITHDRAW (Min ₹200)</button>
        </div>
    </div>

    <script>
        // CONFIG (Same as before)
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Check Auth
        auth.onAuthStateChanged(user => {
            if (user) {
                loadWallet(user.uid);
            } else {
                // For testing, if not logged in, show a simple prompt
                let email = prompt("Testing Email:");
                let pass = prompt("Testing Password (6 chars):");
                auth.signInWithEmailAndPassword(email, pass).catch(() => {
                    auth.createUserWithEmailAndPassword(email, pass).then(u => {
                        db.collection("wallets").doc(u.user.uid).set({ balance: 50 });
                    });
                });
            }
        });

        function loadWallet(uid) {
            db.collection("wallets").doc(uid).onSnapshot(doc => {
                const bal = doc.data().balance || 0;
                document.getElementById('main-bal').innerText = bal.toFixed(2);
                document.getElementById('screen-bal').innerText = bal.toFixed(2);
            });
        }

        function openScreen(id) { document.getElementById(id).classList.add('active'); }
        function closeScreen(id) { document.getElementById(id).classList.remove('active'); }

        function play(name) {
            alert("Starting " + name + "... (Game logic coming soon)");
        }
    </script>
</body>
</html>
