<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WhatsApp Pro Max v8</title>
    <style>
        :root { 
            --wa-bg: #0b141a; --wa-header: #111b21; --wa-text: white; 
            --wa-accent: #25d366; --wa-dim: #8696a0; --wa-sent: #005c4b; --wa-recv: #202c33;
            --trans: all 0.3s ease;
        }
        .light-mode {
            --wa-bg: #f0f2f5; --wa-header: #ffffff; --wa-text: #111b21;
            --wa-sent: #dcf8c6; --wa-recv: #ffffff; --wa-dim: #667781;
        }

        * { box-sizing: border-box; transition: var(--trans); }
        body { margin: 0; background: var(--wa-bg); color: var(--wa-text); font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        #auth-screen, #app-screen, #chat-window { display: none; height: 100%; flex-direction: column; width: 100%; }
        #auth-screen { justify-content: center; align-items: center; padding: 20px; display: flex; }

        .input-field { width: 100%; max-width: 300px; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: #2a3942; color: white; outline: none; }
        .light-mode .input-field { background: #fff; color: #333; border: 1px solid #ccc; }

        .btn { width: 100%; max-width: 300px; padding: 12px; background: var(--wa-accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #0b141a; }

        .top-nav { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--wa-header); border-bottom: 1px solid #202c33; flex-shrink: 0; }
        .light-mode .top-nav { border-bottom: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px 15px; align-items: center; border-bottom: 0.5px solid #202c33; cursor: pointer; }
        .light-mode .chat-item { border-bottom: 0.5px solid #eee; }

        .avatar { width: 45px; height: 45px; background: #3d474c; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }

        #chat-window { position: fixed; top: 0; left: 0; z-index: 1000; background: var(--wa-bg); }
        #msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; padding-bottom: 100px; }
        
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 75%; font-size: 14.5px; position: relative; color: #111b21; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .sent { background: var(--wa-sent); align-self: flex-end; border-top-right-radius: 0; }
        .recv { background: var(--wa-recv); align-self: flex-start; border-top-left-radius: 0; }
        .light-mode .msg { color: #111b21; }
        .dark-mode .msg { color: white; }

        .type-area { position: absolute; bottom: 0; width: 100%; padding: 10px 12px 30px 12px; background: var(--wa-header); display: flex; gap: 10px; align-items: center; }
        .msg-input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; background: #2a3942; color: white; outline: none; font-size: 16px; }
        .light-mode .msg-input { background: #fff; color: #333; border: 1px solid #ddd; }
        .send-btn { width: 48px; height: 48px; background: var(--wa-accent); border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #0b141a; }

        .theme-toggle { font-size: 20px; cursor: pointer; padding: 5px; }
    </style>
</head>
<body class="dark-mode">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div id="auth-screen">
        <div>
            <h1 style="color: var(--wa-accent); font-size: 35px; margin:0;">WhatsApp</h1>
            <p style="color: var(--wa-dim)">v8.0 Themes & Self-Chat</p>
            <input type="email" id="email" class="input-field" placeholder="Email Address">
            <input type="password" id="pass" class="input-field" placeholder="Password">
            <button class="btn" onclick="handleAuth()">LOGIN</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="top-nav">
            <b>WhatsApp Lite</b>
            <div>
                <span class="theme-toggle" onclick="toggleTheme()">🌙</span>
                <span onclick="auth.signOut()" style="color:var(--wa-accent); font-size:12px; margin-left:15px;">LOGOUT</span>
            </div>
        </div>
        <div style="padding: 10px;"><button class="btn" style="width: 100%;" onclick="sendRequest()">+ ADD FRIEND</button></div>
        <div id="requests-area"></div>
        <div class="chat-list" id="contacts"></div>
    </div>

    <div id="chat-window">
        <div class="top-nav">
            <div style="display:flex; align-items:center; gap:10px;">
                <span onclick="backToHome()" style="font-size: 24px; cursor:pointer;">←</span>
                <div class="avatar" style="width:32px; height:32px;">👤</div>
                <div>
                    <div id="chat-with-name" style="font-size:14px; font-weight:bold;">Chat</div>
                    <div id="chat-status" style="font-size:11px;">offline</div>
                </div>
            </div>
            <span onclick="clearChat()" style="color: #ff4d4d; font-size: 11px; font-weight: bold; cursor:pointer;">CLEAR</span>
        </div>
        <div id="msg-box"></div>
        <div class="type-area">
            <input type="text" id="m-input" class="msg-input" placeholder="Message" oninput="handleTyping()">
            <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
          authDomain: "my-insta-backend.firebaseapp.com",
          databaseURL: "https://my-insta-backend-default-rtdb.firebaseio.com",
          projectId: "my-insta-backend",
          storageBucket: "my-insta-backend.firebasestorage.app",
          messagingSenderId: "955106968523",
          appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let activeChat = "";
        let isFirstLoad = true;

        function handleAuth() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => auth.createUserWithEmailAndPassword(e, p));
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.querySelector('.theme-toggle');
            if(body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                btn.innerText = "🌙";
            } else {
                body.classList.add('light-mode');
                btn.innerText = "☀️";
            }
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('auth-screen').style.display = user ? 'none' : 'flex';
            document.getElementById('app-screen').style.display = user ? 'flex' : 'none';
            if(user) {
                const myID = btoa(user.email).replace(/[/=]/g, "");
                db.ref(`status/${myID}`).set("online");
                db.ref(`status/${myID}`).onDisconnect().set("offline");
                loadData();
            }
        });

        function loadData() {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            
            db.ref(`friends/${myID}`).on('value', snap => {
                const list = document.getElementById('contacts'); list.innerHTML = "";
                
                // Add Self Chat (You)
                const selfDiv = document.createElement('div');
                selfDiv.className = "chat-item";
                selfDiv.innerHTML = `<div class="avatar" style="background:var(--wa-accent)">Y</div><div><b>You (Message Yourself)</b><br><small style="color:var(--wa-dim)">Notes, reminders...</small></div>`;
                selfDiv.onclick = () => openChat(auth.currentUser.email);
                list.appendChild(selfDiv);

                snap.forEach(child => {
                    const fEmail = child.val().email;
                    const fID = btoa(fEmail).replace(/[/=]/g, "");
                    const div = document.createElement('div');
                    div.className = "chat-item";
                    div.innerHTML = `<div class="avatar">👤</div><div><b>${fEmail}</b><br><small id="s-${fID}" style="color:var(--wa-dim);">offline</small></div>`;
                    div.onclick = () => openChat(fEmail);
                    list.appendChild(div);
                    db.ref(`status/${fID}`).on('value', s => { 
                        const el = document.getElementById(`s-${fID}`);
                        if(el) { el.innerText = s.val() === "online" ? "online" : "offline"; el.style.color = s.val() === "online" ? "#25d366" : "#8696a0"; }
                    });
                });
            });
            // Handle Requests
            db.ref(`requests/${myID}`).on('value', snap => {
                const area = document.getElementById('requests-area'); area.innerHTML = "";
                snap.forEach(child => { if(child.val().status === 'pending') area.innerHTML += `<div style="padding:10px; background:var(--wa-recv); margin:10px; border-radius:8px;">New Friend: ${child.val().from}<br><button class="btn" style="padding:5px; margin-top:5px; width:100px;" onclick="accept('${child.key}', '${child.val().from}')">Accept</button></div>`; });
            });
        }

        function openChat(email) {
            activeChat = email;
            isFirstLoad = true;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-with-name').innerText = (email === auth.currentUser.email) ? "You" : email;
            const chatID = [auth.currentUser.email, email].sort().join("").replace(/[@.]/g, "");
            
            db.ref(`chats/${chatID}`).on('value', snap => {
                const box = document.getElementById('msg-box');
                box.innerHTML = "";
                snap.forEach(m => {
                    const data = m.val(); const isMe = data.sender === auth.currentUser.email;
                    const d = document.createElement('div'); d.className = `msg ${isMe ? 'sent' : 'recv'}`;
                    d.innerHTML = `${data.text} ${data.heart ? '<span class="heart">❤️</span>' : ''} <div style="font-size:9px; opacity:0.6; text-align:right;">${new Date(data.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} ${isMe ? '✔✔' : ''}</div>`;
                    
                    let lastTap = 0;
                    d.addEventListener('touchend', e => {
                        let now = new Date().getTime();
                        if(now - lastTap < 300) { db.ref(`chats/${chatID}/${m.key}/heart`).set(!data.heart); }
                        lastTap = now;
                    });
                    
                    d.oncontextmenu = e => { e.preventDefault(); if(isMe && confirm("Delete?")) db.ref(`chats/${chatID}/${m.key}`).remove(); };
                    box.appendChild(d);
                });

                if(!isFirstLoad && snap.numChildren() > 0) {
                    const lastMsg = Object.values(snap.val()).pop();
                    if(lastMsg.sender !== auth.currentUser.email) {
                        document.getElementById('notif-sound').play();
                        if(navigator.vibrate) navigator.vibrate(100);
                    }
                }
                isFirstLoad = false;
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('m-input'); if(!i.value.trim()) return;
            const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, "");
            db.ref(`chats/${chatID}`).push({sender: auth.currentUser.email, text: i.value, time: Date.now()});
            i.value = "";
        }

        function handleTyping() {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`typing/${myID}`).set(activeChat);
            clearTimeout(window.tTimer);
            window.tTimer = setTimeout(() => db.ref(`typing/${myID}`).remove(), 2000);
        }

        function sendRequest() {
            const email = prompt("Friend's Email:");
            if(!email || email === auth.currentUser.email) return;
            const targetID = btoa(email).replace(/[/=]/g, "");
            db.ref(`requests/${targetID}/${btoa(auth.currentUser.email).replace(/[/=]/g, "")}`).set({ from: auth.currentUser.email, status: 'pending' });
        }

        function accept(key, email) {
            const myID = btoa(auth.currentUser.email).replace(/[/=]/g, "");
            db.ref(`friends/${myID}/${key}`).set({email: email});
            db.ref(`friends/${key}/${myID}`).set({email: auth.currentUser.email});
            db.ref(`requests/${myID}/${key}`).remove();
        }

        function clearChat() { if(confirm("Clear chat?")) { const chatID = [auth.currentUser.email, activeChat].sort().join("").replace(/[@.]/g, ""); db.ref(`chats/${chatID}`).remove(); } }
        function backToHome() { document.getElementById('chat-window').style.display = 'none'; }
    </script>
</body>
</html>
