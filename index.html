<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #000; --border: #262626; --accent: #0095f6; --text: #fff; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; }
        .header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 44px; }
        .footer { background: var(--bg); border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 12px 0; font-size: 24px; z-index: 1000; }
        .section { display: none; padding-bottom: 70px; min-height: 100vh; }
        .active { display: block; }
        .post-card { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
        .post-img { width: 100%; display: block; background: #1a1a1a; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; }
        #post-viewer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:5000; overflow-y:auto; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 22px; font-weight: bold; font-style: italic;">Instagram</div>
        <div onclick="upload()">➕</div>
    </div>

    <div id="post-viewer">
        <div style="padding:15px; border-bottom:1px solid var(--border); display:flex; align-items:center;">
            <span onclick="this.parentElement.parentElement.style.display='none'" style="font-size:24px; margin-right:20px;">⬅️</span><b>Post Details</b>
        </div>
        <div id="v-content"></div>
    </div>

    <div id="feed" class="section active"><div id="f-cont"></div></div>
    
    <div id="profile" class="section">
        <div style="padding: 20px 15px; display: flex; align-items: center; gap: 20px;">
            <img id="my-dp" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:75px; height:75px; border-radius:50%; object-fit:cover;">
            <div style="display: flex; flex: 1; justify-content: space-around; text-align: center;">
                <div><b id="pc">0</b><br><small>posts</small></div>
                <div><b>267</b><br><small>followers</small></div>
                <div><b>258</b><br><small>following</small></div>
            </div>
        </div>
        <div style="padding:0 15px;"><b id="my-name">tanish_mandloi._</b></div>
        <div class="grid" id="my-grid" style="margin-top:20px;"></div>
    </div>

    <div class="footer">
        <span onclick="go('feed')">🏠</span>
        <span onclick="go('profile')">👤</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDEEypOjcHmWga-U2Lw-xshTwXYKYzJp04",
            authDomain: "my-insta-backend.firebaseapp.com",
            projectId: "my-insta-backend",
            storageBucket: "my-insta-backend.firebasestorage.app",
            messagingSenderId: "955106968523",
            appId: "1:955106968523:web:4f038e3f139d1f06ba6c4e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let me = { name: "User" };

        auth.onAuthStateChanged(async user => {
            if (user) {
                const d = await db.collection("users").doc(user.uid).get();
                if(d.exists) me = d.data();
                go('feed');
            } else {
                let e = prompt("Email:"), p = prompt("Password:");
                auth.signInWithEmailAndPassword(e,p).catch(()=>location.reload());
            }
        });

        function go(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'feed') loadF();
            if(id === 'profile') loadP();
        }

        // --- FEED (No Filter to avoid Index Error) ---
        function loadF() {
            db.collection("posts").onSnapshot(snap => {
                let h = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    h += `<div class="post-card">
                        <div style="padding:10px; font-weight:bold;">@${d.username}</div>
                        <img src="${d.url}" class="post-img" ondblclick="like('${doc.id}', ${d.likes || 0})">
                        <div style="padding:10px;">❤️ <b>${d.likes || 0} likes</b></div>
                    </div>`;
                });
                document.getElementById('f-cont').innerHTML = h || "<p style='text-align:center'>No posts yet.</p>";
            });
        }

        // --- PROFILE GRID ---
        async function loadP() {
            document.getElementById('my-name').innerText = me.name;
            const snap = await db.collection("posts").get();
            let gh = "", count = 0;
            snap.forEach(doc => {
                const d = doc.data();
                if(d.uid === auth.currentUser.uid) {
                    count++;
                    gh += `<img src="${d.url}" class="grid-img" onclick="view('${doc.id}')">`;
                }
            });
            document.getElementById('pc').innerText = count;
            document.getElementById('my-grid').innerHTML = gh;
        }

        // --- VIEW & LIKE ---
        async function view(id) {
            const d = (await db.collection("posts").doc(id).get()).data();
            document.getElementById('v-content').innerHTML = `
                <div class="post-card">
                    <div style="padding:10px; font-weight:bold;">@${d.username}</div>
                    <img src="${d.url}" class="post-img">
                    <button onclick="del('${id}')" style="color:red; background:none; border:none; padding:15px;">Delete Post</button>
                </div>`;
            document.getElementById('post-viewer').style.display = 'block';
        }

        function like(id, l) { db.collection("posts").doc(id).update({ likes: l + 1 }); }
        
        async function del(id) {
            if(confirm("Delete?")) {
                await db.collection("posts").doc(id).delete();
                document.getElementById('post-viewer').style.display = 'none';
                loadP();
            }
        }

        function upload() {
            const u = prompt("Image URL:");
            if(u) db.collection("posts").add({ url: u, uid: auth.currentUser.uid, username: me.name, likes: 0, time: Date.now() });
        }
    </script>
</body>
</html>
